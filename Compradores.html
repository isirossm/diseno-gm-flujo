/* =========================================================================
   Walmart Design System — Colors & Type
   Derived from the Walmart.fig design source.
   Bogle is Walmart's proprietary typeface. Nunito is used for body / docs.
   ========================================================================= */

/* ---------- Webfonts ---------- */








/* Bogle has no Medium (500) cut shipped here. Browsers will synthesise a
   slightly heavier weight from 400 — that matches the look in the Figma. */

:root {
  /* ---------------------------------------------------------------------
     COLORS
     --------------------------------------------------------------------- */

  /* Signature Blues (SB) — Walmart's brand spine. SB-400 is the canonical
     "Walmart Blue" used on the masthead, primary buttons, and links. */
  --wm-sb-200: #f2f8fd;   /* near-white wash — used as page bg in nav */
  --wm-sb-300: #e6f1fc;   /* pale tint — tertiary nav bar, hover states */
  --wm-sb-400: #0071dc;   /* WALMART BLUE — primary brand color */
  --wm-sb-500: #004f9a;   /* hover/pressed for primary actions */
  --wm-sb-600: #002d58;   /* deep navy — used for headings on light bg */

  /* Spark Yellow — Walmart's secondary accent. The "Spark" logo is this
     yellow. Used for tags, badges, energy moments. */
  --wm-spark-300: #ffd569;
  --wm-spark-400: #ffc220;   /* canonical Spark Yellow */
  --wm-spark-500: #f3a800;

  /* Neutral Shades (NS) */
  --wm-ns-000: #ffffff;
  --wm-ns-050: #fafafa;
  --wm-ns-100: #f1f1f2;
  --wm-ns-200: #c6c7c9;
  --wm-ns-300: #74767c;
  --wm-ns-400: #46474a;
  --wm-ns-500: #2e2f32;
  --wm-ns-600: #030303;   /* near-black — body copy */
  --wm-ns-700: #000000;

  /* Status Hues (SH) */
  --wm-success-500: #2a8703;
  --wm-success-100: #e7f5df;
  --wm-error-500:   #de1c24;
  --wm-error-100:   #fde8e9;

  /* Beyond Basics (BB) — extended accents seen in marketing surfaces */
  --wm-bb-green-light: #92c17d;
  --wm-bb-green-dark:  #2a8703;
  --wm-bb-red:         #de1c24;
  --wm-bb-brown:       #ad652a;

  /* ---------------------------------------------------------------------
     SEMANTIC ALIASES
     --------------------------------------------------------------------- */
  --color-bg:           var(--wm-ns-000);
  --color-bg-subtle:    var(--wm-sb-200);
  --color-bg-tinted:    var(--wm-sb-300);
  --color-surface:      var(--wm-ns-000);
  --color-surface-alt:  var(--wm-ns-050);

  --color-fg:           var(--wm-ns-600);   /* primary text */
  --color-fg-muted:     var(--wm-ns-300);   /* secondary text */
  --color-fg-subtle:    var(--wm-ns-200);   /* disabled / placeholder */
  --color-fg-inverse:   var(--wm-ns-000);

  --color-link:         var(--wm-sb-400);
  --color-link-hover:   var(--wm-sb-500);

  --color-border:       #f0f0f0;
  --color-border-strong:var(--wm-ns-200);

  --color-brand:        var(--wm-sb-400);
  --color-brand-deep:   var(--wm-sb-600);
  --color-accent:       var(--wm-spark-400);

  --color-success:      var(--wm-success-500);
  --color-error:        var(--wm-error-500);

  /* ---------------------------------------------------------------------
     TYPOGRAPHY
     --------------------------------------------------------------------- */
  /* Bogle for everything — UI, body, headings. Walmart's house typeface. */
  --font-sans:    "Bogle", "Helvetica Neue", Arial, sans-serif;
  --font-body:    "Bogle", "Helvetica Neue", Arial, sans-serif;
  --font-display: "Bogle", "Helvetica Neue", Arial, sans-serif;

  /* Type scale (px) — from the Figma typography spec */
  --fs-title-3xl: 56px;  /* hero */
  --fs-title-2xl: 48px;
  --fs-title-xl:  40px;
  --fs-title-lg:  32px;
  --fs-title-md:  28px;
  --fs-subtitle-lg: 24px;
  --fs-subtitle-sm: 20px;
  --fs-body-lg:   18px;
  --fs-body-md:   16px;   /* base */
  --fs-body-sm:   14px;
  --fs-caption:   12px;

  --lh-tight:   1.0;
  --lh-snug:    1.2;
  --lh-normal:  1.4;
  --lh-relaxed: 1.55;

  /* ---------------------------------------------------------------------
     SHAPING & SIZING
     --------------------------------------------------------------------- */
  --radius-xs:  4px;    /* image tiles inside banners */
  --radius-sm:  8px;    /* cards, banners */
  --radius-md:  16px;
  --radius-lg:  24px;   /* large promo color cards */
  --radius-pill: 100px; /* buttons, chips, "Add" pills */
  --radius-circle: 50%;

  --stroke-thin:    0.5px;
  --stroke-regular: 1px;
  --stroke-medium:  1.5px;
  --stroke-thick:   2px;

  /* Spacing scale (4-step) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 40px;
  --space-8: 48px;
  --space-9: 64px;
  --space-10: 96px;

  /* Shadows — Walmart uses very restrained elevation. */
  --shadow-card:  0 2px 6px rgba(0, 0, 0, 0.10);
  --shadow-hover: 0 4px 14px rgba(0, 113, 220, 0.15);
  --shadow-focus: 0 0 0 3px rgba(0, 113, 220, 0.30);
  --shadow-press: 0 1px 2px rgba(0, 0, 0, 0.15);
}

   ========================================================================= */

/* =========================================================================
   Plataforma Diseño GM — Walmart Chile
   Estilos de aplicación basados en el design system de Walmart.
   Reutiliza tokens y patrones de colors_and_type.css y walmart-shop/styles.css.
   ========================================================================= */

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--font-sans);
  color: var(--color-fg);
  background: var(--wm-ns-100);
}

/* ---------- General layout helpers ---------- */
.app-screen {
  background: var(--wm-ns-100);
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  font-family: var(--font-sans);
  color: var(--color-fg);
  overflow: hidden;
}

.row    { display: flex; align-items: center; gap: 12px; }
.col    { display: flex; flex-direction: column; gap: 12px; }
.stack-sm { display: flex; flex-direction: column; gap: 6px; }
.stack    { display: flex; flex-direction: column; gap: 12px; }
.stack-md { display: flex; flex-direction: column; gap: 16px; }
.stack-lg { display: flex; flex-direction: column; gap: 24px; }
.between  { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.grid     { display: grid; gap: 16px; }
.flex-1   { flex: 1; min-height: 0; }

/* =========================================================================
   MASTHEAD — adaptación del wm-mast del DS para la plataforma interna.
   Mantiene azul Walmart, spark, tipografía y altura. Cambia el contenido:
   nav interno + acceso a Comunicaciones + perfil.
   ========================================================================= */
.gm-mast {
  background: var(--wm-sb-400);
  color: #fff;
  display: flex; align-items: center; gap: 24px;
  padding: 0 28px;
  height: 76px;
  flex-shrink: 0;
  box-shadow: 0 1px 0 rgba(0,0,0,0.06);
}
.gm-mast__logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-sans);
}
.gm-mast__logo img { height: 22px; display: block; }
.gm-mast__logo .sub {
  border-left: 1px solid rgba(255,255,255,0.45);
  padding-left: 10px;
  display: flex; flex-direction: column; line-height: 1.1;
}
.gm-mast__logo .sub b   { font-size: 13px; font-weight: 700; }
.gm-mast__logo .sub span { font-size: 11px; opacity: 0.85; }

.gm-mast__nav {
  display: flex; align-items: center; gap: 6px;
  flex: 1;
  margin-left: 12px;
}
.gm-mast__nav-wrap {
  position: relative;
  display: flex; align-items: center;
}
.gm-mast__nav-item {
  background: none; border: none; color: #fff;
  font-family: var(--font-sans); font-size: 14px; font-weight: 400;
  padding: 8px 14px;
  border-radius: 100px;
  cursor: pointer;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 6px;
  position: relative;
}
.gm-mast__nav-item:hover { background: rgba(255,255,255,0.12); }
.gm-mast__nav-item.is-active {
  background: #fff;
  color: var(--wm-sb-500);
  font-weight: 700;
  box-shadow: 0 2px 0 var(--wm-spark-400);
}
.gm-mast__nav-item.is-disabled { color: rgba(255,255,255,0.5); cursor: not-allowed; }
.gm-mast__nav-item.is-disabled:hover { background: none; }
.gm-mast__nav-caret {
  font-size: 9px; opacity: 0.7;
  margin-left: 2px;
}

/* Submenú de categorías — aparece al hover */
.gm-mast__submenu {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 240px;
  background: #fff;
  border: 1px solid #f0f0f0;
  border-radius: var(--radius-sm);
  box-shadow: 0 8px 24px rgba(0, 45, 88, 0.18);
  padding: 6px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-4px);
  transition: opacity 120ms ease, transform 120ms ease, visibility 120ms;
  z-index: 200;
}
.gm-mast__nav-wrap:hover .gm-mast__submenu,
.gm-mast__submenu:hover {
  opacity: 1; visibility: visible; transform: translateY(0);
}
.gm-mast__submenu-head {
  font-family: var(--font-sans);
  font-size: 11px; font-weight: 700;
  color: var(--wm-ns-400);
  text-transform: uppercase; letter-spacing: 0.06em;
  padding: 8px 12px 6px;
}
.gm-mast__sub-item {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 4px;
  font-family: var(--font-sans); font-size: 14px; font-weight: 400;
  color: var(--wm-ns-600);
  text-decoration: none;
}
.gm-mast__sub-item:hover {
  background: var(--wm-sb-200);
  color: var(--wm-sb-500);
  text-decoration: none;
}
.gm-mast__sub-item.is-disabled {
  color: var(--wm-ns-300);
  pointer-events: none;
}
.gm-mast__sub-chev {
  color: var(--wm-sb-400);
  font-size: 16px;
  line-height: 1;
}
.gm-mast__sub-chip {
  font-family: var(--font-sans); font-size: 10px;
  background: var(--wm-ns-100);
  color: var(--wm-ns-400);
  padding: 2px 8px;
  border-radius: 100px;
  text-transform: lowercase;
  letter-spacing: 0;
}

.gm-mast__actions { display: flex; align-items: center; gap: 6px; }
.gm-mast__btn {
  background: none; border: none; color: #fff; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 100px;
  font-family: var(--font-sans); font-size: 13px;
  position: relative;
}
.gm-mast__btn:hover { background: rgba(255,255,255,0.12); }
.gm-mast__btn.is-active {
  background: #fff;
  color: var(--wm-sb-500);
  font-weight: 700;
  box-shadow: 0 2px 0 var(--wm-spark-400);
}
.gm-mast__btn-icon {
  font-size: 16px; line-height: 1;
  display: inline-flex; align-items: center; justify-content: center;
}
.gm-mast__btn-badge {
  position: absolute; top: 0; right: 4px;
  background: var(--wm-spark-400); color: #030303;
  min-width: 18px; height: 18px; border-radius: 9px; padding: 0 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  border: 1.5px solid var(--wm-sb-400);
}
.gm-mast__btn--comms.is-active .gm-mast__btn-badge {
  border-color: #fff;
}
.gm-mast__avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--wm-spark-400); color: #002d58;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  border: 1.5px solid #fff;
  cursor: pointer;
}

/* Tier 2 — light blue category bar / breadcrumbs (mismo patrón que wm-cats) */
.gm-bar {
  background: var(--wm-sb-200);
  border-bottom: 1px solid var(--wm-sb-300);
  display: flex; align-items: center; gap: 12px;
  padding: 0 28px;
  height: 44px;
  flex-shrink: 0;
  font-size: 13px;
  color: var(--wm-ns-500);
}
.gm-bar a, .gm-bar .crumb {
  color: var(--wm-ns-500); text-decoration: none;
}
.gm-bar .crumb:hover { color: var(--wm-sb-400); text-decoration: underline; }
.gm-bar .crumb.is-current { color: var(--wm-ns-600); font-weight: 700; }
.gm-bar .sep { color: var(--wm-ns-300); }
.gm-bar__spacer { flex: 1; }

/* =========================================================================
   PAGE / CONTENT
   ========================================================================= */
.gm-page {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px 40px;
}
.gm-page__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
.gm-page__title { font-family: var(--font-sans); font-weight: 700; font-size: 28px; line-height: 1.15; color: var(--wm-ns-600); margin: 0; }
.gm-page__sub   { font-family: var(--font-sans); font-size: 14px; color: var(--wm-ns-400); margin-top: 4px; }

/* =========================================================================
   CARDS — adaptación de wm-card
   ========================================================================= */
.gm-card {
  background: #fff;
  border: 1px solid #f0f0f0;
  border-radius: var(--radius-sm);
  padding: 20px;
}
.gm-card--p0 { padding: 0; }
.gm-card--p12 { padding: 12px; }
.gm-card--hover { transition: box-shadow 150ms ease, transform 150ms ease; cursor: pointer; }
.gm-card--hover:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
.gm-card--clickable { cursor: pointer; }

.gm-card__head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.gm-card__title {
  font-family: var(--font-sans);
  font-size: 16px; font-weight: 700; color: var(--wm-ns-600);
  margin: 0;
}
.gm-card__see {
  font-family: var(--font-sans); font-size: 13px;
  color: var(--wm-ns-600); font-weight: 700;
  text-decoration: underline; cursor: pointer;
}
.gm-card__see:hover { color: var(--wm-sb-400); }

/* =========================================================================
   BUTTONS — heredado de wm-btn
   ========================================================================= */
.gm-btn {
  font-family: var(--font-sans); font-weight: 700; font-size: 14px;
  border: none; cursor: pointer; border-radius: 100px;
  padding: 10px 20px; line-height: 1;
  transition: background 120ms ease, color 120ms ease;
  display: inline-flex; align-items: center; gap: 8px;
  white-space: nowrap;
}
.gm-btn--primary { background: var(--wm-sb-400); color: #fff; }
.gm-btn--primary:hover { background: var(--wm-sb-500); }
.gm-btn--primary:active { background: var(--wm-sb-600); }
.gm-btn--secondary { background: #fff; color: #030303; border: 1px solid #030303; }
.gm-btn--secondary:hover { background: var(--wm-ns-100); }
.gm-btn--text { background: none; color: #030303; padding: 6px 4px; text-decoration: underline; }
.gm-btn--text:hover { color: var(--wm-sb-400); }
.gm-btn--sm { padding: 8px 16px; font-size: 13px; }
.gm-btn--lg { padding: 14px 28px; font-size: 16px; }

/* Icon button (no fill) */
.gm-btn--icon {
  background: none; border: 1px solid var(--wm-ns-200); color: var(--wm-ns-500);
  padding: 0; width: 36px; height: 36px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
}
.gm-btn--icon:hover { background: var(--wm-ns-100); }

/* =========================================================================
   FORM CONTROLS
   ========================================================================= */
.gm-field-label {
  font-family: var(--font-sans); font-size: 13px; font-weight: 700;
  color: var(--wm-ns-500); margin-bottom: 6px; display: block;
}
.gm-field {
  width: 100%;
  background: #fff;
  border: 1.5px solid var(--wm-ns-200);
  border-radius: 100px;
  padding: 12px 18px;
  font-family: var(--font-sans); font-size: 14px;
  color: var(--wm-ns-600);
  outline: none;
  height: 48px;
  display: flex; align-items: center; gap: 10px;
}
.gm-field:focus, .gm-field:hover { border-color: var(--wm-sb-400); }
.gm-field input {
  flex: 1; border: none; outline: none; background: none;
  font-family: inherit; font-size: inherit; color: inherit;
  min-width: 0;
}
.gm-field input::placeholder { color: var(--wm-ns-300); }
.gm-field__toggle {
  font-family: var(--font-sans); font-size: 12px; font-weight: 700;
  color: var(--wm-sb-400); background: none; border: none; cursor: pointer;
  text-decoration: underline;
}

/* Search (subtle, sm) — for in-page search */
.gm-search {
  display: flex; align-items: center; gap: 8px;
  background: #fff; border: 1px solid var(--wm-ns-200);
  border-radius: 100px;
  height: 36px; padding: 0 16px;
  font-family: var(--font-sans); font-size: 13px;
  color: var(--wm-ns-400);
}
.gm-search input {
  flex: 1; border: none; outline: none; background: none;
  font-family: inherit; font-size: inherit; color: var(--wm-ns-600);
}
.gm-search input::placeholder { color: var(--wm-ns-400); }

/* =========================================================================
   CHIPS, BADGES, STATUS
   ========================================================================= */
.gm-chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 24px; padding: 0 10px;
  border: 1px solid var(--wm-ns-200);
  border-radius: 100px;
  font-family: var(--font-sans); font-size: 12px;
  color: var(--wm-ns-500); background: #fff;
  white-space: nowrap;
}
.gm-chip--active   { border-color: var(--wm-sb-400); color: var(--wm-sb-400); background: var(--wm-sb-200); }
.gm-chip--success  { border-color: var(--wm-success-500); color: var(--wm-success-500); background: var(--wm-success-100); }
.gm-chip--warning  { border-color: var(--wm-spark-500); color: #6e4a00; background: #fff8e6; }
.gm-chip--error    { border-color: var(--wm-error-500); color: var(--wm-error-500); background: var(--wm-error-100); }
.gm-chip--neutral  { background: var(--wm-ns-100); border-color: var(--wm-ns-200); color: var(--wm-ns-500); }
.gm-chip__dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: currentColor;
}

.gm-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 20px; padding: 0 6px;
  background: var(--wm-error-500); color: #fff;
  border-radius: 10px;
  font-family: var(--font-sans); font-size: 11px; font-weight: 700;
}

/* Severity icons — semáforo de procesos */
.gm-sev { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--wm-ns-500); }
.gm-sev__dot {
  width: 12px; height: 12px; border-radius: 50%;
  flex-shrink: 0;
  border: 1.5px solid;
}
.gm-sev--normal .gm-sev__dot { background: var(--wm-ns-200); border-color: var(--wm-ns-300); }
.gm-sev--warn   .gm-sev__dot { background: var(--wm-spark-400); border-color: var(--wm-spark-500); }
.gm-sev--crit   .gm-sev__dot { background: var(--wm-error-500); border-color: var(--wm-error-500); }
.gm-sev--ok     .gm-sev__dot { background: var(--wm-success-500); border-color: var(--wm-success-500); }

/* Process semaphore (table cells) */
.gm-sem {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  font-size: 10px; line-height: 1;
}
.gm-sem--v { background: var(--wm-success-500); color: #fff; }
.gm-sem--a { background: var(--wm-spark-400); color: #030303; }
.gm-sem--r { background: var(--wm-error-500); color: #fff; }
.gm-sem--g { background: var(--wm-ns-100); border: 1.5px dashed var(--wm-ns-300); color: var(--wm-ns-300); }

/* =========================================================================
   PROGRESS BAR
   ========================================================================= */
.gm-progress {
  height: 8px;
  background: var(--wm-ns-100);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.gm-progress__fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--wm-sb-400);
  border-radius: 4px;
  transition: width 200ms ease;
}
.gm-progress--success .gm-progress__fill { background: var(--wm-success-500); }
.gm-progress--warning .gm-progress__fill { background: var(--wm-spark-400); }
.gm-progress--disabled .gm-progress__fill {
  background: repeating-linear-gradient(45deg, var(--wm-ns-200) 0 4px, transparent 4px 8px);
}

/* =========================================================================
   AVATAR
   ========================================================================= */
.gm-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--wm-sb-200); color: var(--wm-sb-500);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-sans); font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.gm-avatar--sm { width: 24px; height: 24px; font-size: 10px; }
.gm-avatar--lg { width: 40px; height: 40px; font-size: 14px; }

/* =========================================================================
   TABLE
   ========================================================================= */
.gm-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-sans); font-size: 13px;
}
.gm-table th, .gm-table td {
  text-align: left;
  padding: 14px 16px;
  border-bottom: 1px solid #f0f0f0;
  color: var(--wm-ns-600);
}
.gm-table th {
  font-size: 12px; font-weight: 700; color: var(--wm-ns-400);
  text-transform: uppercase; letter-spacing: 0.04em;
  background: var(--wm-ns-050);
  border-bottom: 1px solid var(--wm-ns-200);
}
.gm-table tbody tr:hover { background: var(--wm-sb-200); }
.gm-table tbody tr:last-child td { border-bottom: none; }
.gm-table .col-name { font-weight: 700; }
.gm-table__muted { color: var(--wm-ns-400); font-size: 12px; }
.gm-table__note {
  color: var(--wm-ns-500);
  font-size: 13px; line-height: 1.4;
  max-width: 320px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.gm-table__action {
  background: transparent;
  border: 1px solid var(--wm-ns-200);
  color: var(--wm-ns-600);
  font-family: var(--font-sans); font-size: 12px; font-weight: 700;
  padding: 6px 12px;
  border-radius: 100px;
  cursor: pointer;
  white-space: nowrap;
  opacity: 0; transition: opacity 120ms ease;
}
.gm-table tbody tr:hover .gm-table__action { opacity: 1; }
.gm-table__action:hover { background: var(--wm-sb-400); border-color: var(--wm-sb-400); color: #fff; }

/* Trace table layout — top-align rows since cells are dense */
.gm-table--trace td { vertical-align: top; padding: 14px 10px; }
.gm-table--trace th { padding: 10px 10px; font-size: 11px; }
.gm-table--trace td:first-child, .gm-table--trace th:first-child { padding-left: 20px; }
.gm-table--trace td:last-child, .gm-table--trace th:last-child { padding-right: 20px; }

/* ─── Fase actual (texto) ─── */
.gm-fase__label {
  font-family: var(--font-sans); font-size: 13px; font-weight: 700;
  color: var(--wm-ns-600); line-height: 1.3;
}
.gm-fase__counter {
  font-family: var(--font-sans); font-size: 11px; font-weight: 700;
  color: var(--wm-ns-400);
  text-transform: uppercase; letter-spacing: 0.04em;
  margin-top: 2px;
}

/* Legend below the table (sin uso actualmente) */
.gm-stepper-legend {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-sans); font-size: 11px;
  color: var(--wm-ns-500);
}
.gm-stepper-legend__num {
  width: 18px; height: 18px;
  background: var(--wm-ns-050);
  border: 1px solid var(--wm-ns-200);
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: var(--wm-ns-500);
}

/* ─── Responsable cell (solo texto) ─── */
.gm-owner__name {
  font-family: var(--font-sans); font-size: 13px; font-weight: 700;
  color: var(--wm-ns-600);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.gm-owner__role {
  font-family: var(--font-sans); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 2px;
}
.gm-owner__role--int { color: var(--wm-sb-400); }
.gm-owner__role--ext { color: #8a5a00; }
.gm-owner__ext-marker {
  background: #002d58;
  color: var(--wm-spark-400);
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 9px; font-weight: 700;
}

/* ─── Filtros row ─── */
.gm-filters {
  display: flex; align-items: center; flex-wrap: wrap;
  gap: 8px;
  padding: 12px 20px;
  background: var(--wm-ns-050);
  border-top: 1px solid #f0f0f0;
  border-bottom: 1px solid var(--wm-ns-200);
}
.gm-filters__label {
  font-family: var(--font-sans); font-size: 11px; font-weight: 700;
  color: var(--wm-ns-500);
  text-transform: uppercase; letter-spacing: 0.04em;
  margin-right: 4px;
}
.gm-filter {
  display: inline-flex; align-items: center; gap: 6px;
  background: #fff;
  border: 1px solid var(--wm-ns-200);
  border-radius: 100px;
  padding: 6px 12px;
  font-family: var(--font-sans); font-size: 12px; font-weight: 400;
  color: var(--wm-ns-500);
  cursor: pointer;
  line-height: 1;
}
.gm-filter:hover { border-color: var(--wm-sb-400); color: var(--wm-sb-400); }
.gm-filter b { font-weight: 700; color: var(--wm-ns-600); }
.gm-filter--active {
  background: var(--wm-sb-200);
  border-color: var(--wm-sb-400);
  color: var(--wm-sb-500);
}
.gm-filter--active b { color: var(--wm-sb-500); }
.gm-filter__x {
  background: transparent; border: none; cursor: pointer;
  color: var(--wm-sb-400); font-size: 14px; line-height: 1;
  padding: 0; margin-left: 2px;
  width: 16px; height: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%;
}
.gm-filter__x:hover { background: rgba(0,113,220,0.15); }
.gm-filter--dropdown {
  background: #fff;
  font-weight: 700; color: var(--wm-ns-600);
}
.gm-filter__caret { font-size: 9px; opacity: 0.6; }
.gm-filter--add {
  background: transparent;
  border: 1px dashed var(--wm-ns-300);
  color: var(--wm-ns-500);
  font-weight: 700;
}
.gm-filter--add:hover {
  border-style: solid;
  border-color: var(--wm-sb-400);
  color: var(--wm-sb-400);
}
.gm-filters__clear {
  background: transparent; border: none; cursor: pointer;
  font-family: var(--font-sans); font-size: 12px; font-weight: 700;
  color: var(--wm-ns-400);
  margin-left: auto;
  text-decoration: underline;
}
.gm-filters__clear:hover { color: var(--wm-sb-400); }

/* =========================================================================
   KANBAN
   ========================================================================= */
.gm-kanban {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.gm-kanban__col {
  background: var(--wm-ns-050);
  border: 1px solid #f0f0f0;
  border-radius: var(--radius-sm);
  padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 240px;
}
.gm-kanban__head {
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--font-sans); font-size: 13px; font-weight: 700;
  color: var(--wm-ns-500);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.gm-kanban__count {
  background: #fff; border: 1px solid var(--wm-ns-200);
  border-radius: 100px; padding: 2px 10px;
  font-size: 11px; font-weight: 700; color: var(--wm-ns-500);
  text-transform: none; letter-spacing: 0;
}
.gm-task {
  background: #fff;
  border: 1px solid #f0f0f0;
  border-radius: var(--radius-sm);
  padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
  font-family: var(--font-sans); font-size: 13px;
  cursor: pointer;
  transition: box-shadow 120ms ease;
}
.gm-task:hover { box-shadow: var(--shadow-card); }
.gm-task__title { font-weight: 700; color: var(--wm-ns-600); line-height: 1.3; }
.gm-task__meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--wm-ns-400); }
.gm-task--compact { padding: 8px 10px; gap: 4px; font-size: 12px; }
.gm-task--compact .gm-task__title { font-size: 12px; }
.gm-task--compact .gm-task__meta { font-size: 11px; }

/* =========================================================================
   CATEGORY CARD — compact: hero strip + status chip + progress + meta line
   ========================================================================= */
.gm-cat {
  background: #fff;
  border: 1px solid #f0f0f0;
  border-radius: var(--radius-sm);
  display: flex; flex-direction: column;
  cursor: pointer;
  overflow: hidden;
  transition: box-shadow 150ms ease, transform 150ms ease, border-color 150ms ease;
  position: relative;
}
.gm-cat:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
  border-color: var(--wm-sb-300);
}
.gm-cat:hover .gm-cat__chev { color: var(--wm-sb-400); }

/* Hero strip — slim, image-area feel with spark in corner + icon */
.gm-cat__hero {
  height: 64px;
  background:
    radial-gradient(circle at 92% 30%, rgba(255,194,32,0.22) 0%, transparent 55%),
    linear-gradient(135deg, var(--wm-sb-400) 0%, var(--wm-sb-500) 100%);
  position: relative;
  display: flex; align-items: center;
  padding: 0 16px;
  overflow: hidden;
}
.gm-cat__hero-spark {
  position: absolute;
  right: -20px; bottom: -26px;
  width: 90px; height: 90px;
  color: rgba(255, 194, 32, 0.22);
  pointer-events: none;
}
.gm-cat__hero-spark svg { width: 100%; height: 100%; fill: currentColor; }
.gm-cat__hero-icon {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.22);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  flex-shrink: 0;
  position: relative; z-index: 1;
}

/* Status chip sits top-right of hero */
.gm-cat__hero-chip {
  position: absolute;
  top: 10px; right: 12px;
  background: #fff;
  border-radius: 100px;
  padding: 3px 9px;
  font-family: var(--font-sans);
  font-size: 11px; font-weight: 700;
  display: inline-flex; align-items: center; gap: 6px;
  z-index: 2;
  letter-spacing: 0;
}
.gm-cat__hero-chip-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: currentColor;
}
.gm-cat__hero-chip--ok    { color: var(--wm-success-500); }
.gm-cat__hero-chip--warn  { color: #6e4a00; background: var(--wm-spark-400); }
.gm-cat__hero-chip--warn .gm-cat__hero-chip-dot { background: #6e4a00; }
.gm-cat__hero-chip--crit  { color: #fff; background: var(--wm-error-500); }
.gm-cat__hero-chip--crit .gm-cat__hero-chip-dot { background: #fff; }
.gm-cat__hero-chip--muted { color: var(--wm-ns-400); background: var(--wm-ns-100); }

.gm-cat__hero--disabled {
  background:
    repeating-linear-gradient(45deg, transparent 0 10px, rgba(70,71,74,0.04) 10px 11px),
    var(--wm-ns-100);
}
.gm-cat__hero--disabled .gm-cat__hero-spark { color: rgba(116, 118, 124, 0.10); }
.gm-cat__hero--disabled .gm-cat__hero-icon {
  background: #fff; color: var(--wm-ns-300);
  border-color: var(--wm-ns-200);
}

/* Body — title row, sub, progress, milestone, meta line */
.gm-cat__body {
  padding: 14px 16px 14px;
  display: flex; flex-direction: column;
  gap: 8px;
  flex: 1;
}
.gm-cat__title-row {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 12px;
}
.gm-cat__name { font-family: var(--font-sans); font-size: 16px; font-weight: 700; color: var(--wm-ns-600); line-height: 1.2; }
.gm-cat__sub  { font-family: var(--font-sans); font-size: 12px; color: var(--wm-ns-400); line-height: 1.3; margin-bottom: 4px; }
.gm-cat__progress-pct { font-family: var(--font-sans); font-size: 16px; font-weight: 700; color: var(--wm-sb-400); line-height: 1; }

.gm-cat__chev {
  position: absolute; right: 12px; bottom: 12px;
  color: var(--wm-ns-300); font-size: 18px; line-height: 1;
  font-weight: 700;
}

.gm-cat__milestone {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-sans); font-size: 12px;
  color: var(--wm-ns-500);
  background: var(--wm-ns-050);
  border-radius: 6px;
  padding: 8px 10px;
  line-height: 1.3;
  margin-top: 4px;
}
.gm-cat__milestone b { color: var(--wm-ns-600); font-weight: 700; }
.gm-cat__milestone-icon {
  font-size: 13px; line-height: 1;
  filter: grayscale(0.2);
}

.gm-cat__meta-row {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-top: 2px;
}
.gm-cat__meta-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--font-sans);
  font-size: 11px; font-weight: 700;
  color: var(--wm-ns-500);
  background: var(--wm-ns-050);
  border: 1px solid #f0f0f0;
  border-radius: 100px;
  padding: 2px 8px;
  line-height: 1.4;
}
.gm-cat__meta-pill--crit { color: var(--wm-error-500); border-color: var(--wm-error-100); background: var(--wm-error-100); }
.gm-cat__meta-pill--warn { color: #6e4a00; border-color: #fff0c2; background: #fff8e6; }
.gm-cat__meta-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
}

.gm-cat--disabled { cursor: not-allowed; }
.gm-cat--disabled:hover { box-shadow: none; transform: none; border-color: #f0f0f0; }
.gm-cat--disabled .gm-cat__milestone { color: var(--wm-ns-400); }
.gm-cat--disabled .gm-cat__milestone b { color: var(--wm-ns-500); }
.gm-cat--disabled .gm-cat__name { color: var(--wm-ns-500); }

/* =========================================================================
   ALERTS
   ========================================================================= */
.gm-alert {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid #f0f0f0;
}
.gm-alert:last-child { border-bottom: none; }
.gm-alert__body { flex: 1; min-width: 0; }
.gm-alert__title { font-family: var(--font-sans); font-size: 14px; font-weight: 700; color: var(--wm-ns-600); }
.gm-alert__desc  { font-family: var(--font-sans); font-size: 13px; color: var(--wm-ns-400); margin-top: 2px; }

/* Alert card variant (lateral border) */
.gm-alert-card {
  display: flex; border: 1px solid #f0f0f0; border-radius: var(--radius-sm); overflow: hidden;
  background: #fff;
}
.gm-alert-card__rail { width: 6px; flex-shrink: 0; }
.gm-alert-card__rail--crit { background: var(--wm-error-500); }
.gm-alert-card__rail--warn { background: var(--wm-spark-400); }
.gm-alert-card__rail--normal { background: var(--wm-ns-200); }
.gm-alert-card__body { padding: 14px 16px; flex: 1; }

/* =========================================================================
   QUICK LINKS
   ========================================================================= */
.gm-quick {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  background: #fff;
  border: 1px solid #f0f0f0;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 120ms ease, border-color 120ms ease;
}
.gm-quick:hover { background: var(--wm-sb-200); border-color: var(--wm-sb-300); }
.gm-quick__name { font-family: var(--font-sans); font-size: 14px; font-weight: 700; color: var(--wm-ns-600); }
.gm-quick__chev { color: var(--wm-sb-400); font-size: 16px; line-height: 1; }

/* =========================================================================
   COLLECTION CARD (Verano 25, etc.) — image header + body
   ========================================================================= */
.gm-coll {
  background: #fff;
  border: 1px solid #f0f0f0;
  border-radius: var(--radius-sm);
  display: flex; flex-direction: column;
  cursor: pointer;
  overflow: hidden;
  transition: box-shadow 150ms ease, transform 150ms ease;
}
.gm-coll:hover { box-shadow: var(--shadow-card); transform: translateY(-1px); }
.gm-coll__img {
  height: 96px;
  position: relative;
  overflow: hidden;
  display: flex; align-items: center;
  padding-left: 20px;
}
.gm-coll__img::after {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.18) 0, transparent 50%),
    repeating-linear-gradient(45deg, transparent 0 22px, rgba(255,255,255,0.04) 22px 23px);
  pointer-events: none;
}
.gm-coll__img-icon {
  position: relative; z-index: 1;
  opacity: 0.9;
}
.gm-coll__img-chip {
  position: absolute;
  top: 12px; right: 12px;
  background: rgba(255,255,255,0.92);
  color: var(--wm-success-500);
  font-family: var(--font-sans); font-size: 11px; font-weight: 700;
  padding: 4px 10px 4px 18px;
  border-radius: 100px;
  z-index: 2;
  position: absolute;
}
.gm-coll__img-chip::before {
  content: "";
  position: absolute; left: 8px; top: 50%;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--wm-success-500);
  transform: translateY(-50%);
}
.gm-coll__body {
  padding: 14px 16px 16px;
  display: flex; flex-direction: column;
  gap: 10px;
}
.gm-coll__head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.gm-coll__name { font-family: var(--font-sans); font-size: 18px; font-weight: 700; color: var(--wm-ns-600); margin: 0; line-height: 1.1; }
.gm-coll__dates { font-family: var(--font-sans); font-size: 12px; color: var(--wm-ns-400); margin-top: 3px; }
.gm-coll__pct { font-family: var(--font-sans); font-size: 24px; font-weight: 700; color: var(--wm-sb-400); line-height: 1; }

/* =========================================================================
   SPARK helper (yellow brand mark)
   ========================================================================= */
.gm-spark {
  display: inline-block;
  width: 28px; height: 28px;
  color: var(--wm-spark-400);
}
.gm-spark svg { width: 100%; height: 100%; display: block; fill: currentColor; }

/* =========================================================================
   SPLASH SCREEN
   ========================================================================= */
.gm-splash {
  width: 100%; height: 100%;
  background: var(--wm-sb-400);
  color: #fff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 40px;
  position: relative;
  overflow: hidden;
}
.gm-splash__bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,194,32,0.10) 0, transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.06) 0, transparent 40%);
}
.gm-splash__brand { display: flex; flex-direction: column; align-items: center; gap: 18px; position: relative; z-index: 1; }
.gm-splash__logo  { display: flex; align-items: center; gap: 14px; }
.gm-splash__logo .word { font-family: var(--font-sans); font-size: 48px; font-weight: 700; letter-spacing: -0.01em; color: #fff; }
.gm-splash__logo .spark { width: 48px; height: 48px; color: var(--wm-spark-400); }
.gm-splash__title { font-family: var(--font-sans); font-size: 18px; font-weight: 400; opacity: 0.85; }
.gm-splash__badge { font-family: var(--font-sans); font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--wm-spark-400); }

.gm-splash__loader { display: flex; flex-direction: column; align-items: center; gap: 12px; position: relative; z-index: 1; }
.gm-splash__progress {
  width: 220px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden;
}
.gm-splash__progress > div {
  height: 100%; background: var(--wm-spark-400); border-radius: 2px;
  animation: gm-splash-load 1.6s ease-in-out infinite;
}
@keyframes gm-splash-load {
  0%   { width: 8%;  transform: translateX(0); }
  50%  { width: 60%; }
  100% { width: 8%;  transform: translateX(220px); }
}
.gm-splash__foot {
  position: absolute; bottom: 28px; left: 0; right: 0; text-align: center;
  font-family: var(--font-sans); font-size: 12px; color: rgba(255,255,255,0.7);
  z-index: 1;
}

/* =========================================================================
   LOGIN
   ========================================================================= */
.gm-login {
  width: 100%; height: 100%;
  display: grid; grid-template-columns: 1fr 480px;
  background: #fff;
}
.gm-login__brand {
  background: var(--wm-sb-400);
  color: #fff;
  padding: 56px;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative;
  overflow: hidden;
}
.gm-login__brand::before {
  content: ""; position: absolute; right: -80px; bottom: -80px;
  width: 360px; height: 360px;
  color: rgba(255,194,32,0.10);
}
.gm-login__sparkbg {
  position: absolute; right: -40px; bottom: -40px;
  width: 320px; height: 320px;
  color: rgba(255,194,32,0.18);
}
.gm-login__sparkbg svg { width: 100%; height: 100%; fill: currentColor; }
.gm-login__brand-logo { display: flex; align-items: center; gap: 14px; position: relative; z-index: 1; }
.gm-login__brand-logo .word { font-family: var(--font-sans); font-size: 36px; font-weight: 700; letter-spacing: -0.01em; }
.gm-login__brand-logo .spark { width: 36px; height: 36px; color: var(--wm-spark-400); }
.gm-login__brand-tag {
  font-family: var(--font-sans); font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--wm-spark-400); margin-top: 6px;
}
.gm-login__brand-copy { position: relative; z-index: 1; max-width: 460px; }
.gm-login__brand-copy h2 { font-family: var(--font-sans); font-size: 36px; font-weight: 700; line-height: 1.15; margin: 0 0 12px; color: #fff; }
.gm-login__brand-copy p  { font-family: var(--font-sans); font-size: 16px; line-height: 1.5; color: rgba(255,255,255,0.85); margin: 0; }

.gm-login__brand-foot { position: relative; z-index: 1; font-family: var(--font-sans); font-size: 12px; color: rgba(255,255,255,0.7); }

.gm-login__form { padding: 56px 48px; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
.gm-login__form h1 { font-family: var(--font-sans); font-size: 32px; font-weight: 700; margin: 0; color: var(--wm-ns-600); }
.gm-login__form .sub { font-family: var(--font-sans); font-size: 14px; color: var(--wm-ns-400); margin: 0; }
.gm-login__form .row-line { display: flex; align-items: center; gap: 16px; }
.gm-login__form .row-line::before, .gm-login__form .row-line::after {
  content: ""; flex: 1; height: 1px; background: var(--wm-ns-200);
}
.gm-login__form .row-line span { font-size: 12px; color: var(--wm-ns-300); }
.gm-login__form .legal { font-family: var(--font-sans); font-size: 12px; color: var(--wm-ns-400); text-align: center; }

/* =========================================================================
   COMUNICACIONES — chat layout · internal vs external (proveedor)
   ========================================================================= */
.gm-comms { display: grid; grid-template-columns: 360px 1fr; height: 100%; }
.gm-comms__list { background: #fff; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; overflow: hidden; }
.gm-comms__list-head { padding: 14px 14px 0; border-bottom: 1px solid #f0f0f0; }

/* Segmented tabs: internal vs external */
.gm-comms__tabs {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4px;
  background: var(--wm-ns-050);
  padding: 4px;
  border-radius: 100px;
  margin-top: 12px;
  margin-bottom: 12px;
}
.gm-comms__tab {
  background: transparent; border: none; cursor: pointer;
  font-family: var(--font-sans); font-size: 13px; font-weight: 700;
  color: var(--wm-ns-500);
  padding: 7px 10px;
  border-radius: 100px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.gm-comms__tab:hover { color: var(--wm-ns-600); }
.gm-comms__tab.is-active {
  background: #fff;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}
.gm-comms__tab--int.is-active { color: var(--wm-sb-500); }
.gm-comms__tab--ext.is-active { color: #6e4a00; }
.gm-comms__tab-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.gm-comms__tab-dot--int { background: var(--wm-sb-400); }
.gm-comms__tab-dot--ext { background: var(--wm-spark-400); border: 1px solid var(--wm-spark-500); }
.gm-comms__tab-count {
  background: var(--wm-ns-100);
  color: var(--wm-ns-500);
  border-radius: 100px;
  padding: 1px 7px;
  font-size: 11px; font-weight: 700;
}
.gm-comms__tab-count--alert {
  background: var(--wm-error-500);
  color: #fff;
}

.gm-comms__list-body { flex: 1; overflow-y: auto; }
.gm-comms__group {
  padding: 10px 16px;
  background: var(--wm-ns-050);
  font-family: var(--font-sans); font-size: 11px; font-weight: 700;
  color: var(--wm-ns-500);
  text-transform: uppercase; letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 8px;
  border-top: 1px solid #f0f0f0;
}
.gm-comms__group:first-child { border-top: none; }
.gm-comms__group-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.gm-comms__group-dot--int { background: var(--wm-sb-400); }
.gm-comms__group-dot--ext { background: var(--wm-spark-400); border: 1px solid var(--wm-spark-500); }
.gm-comms__group--ext {
  background: linear-gradient(to right, rgba(255,194,32,0.10), transparent);
}

/* Conversation row */
.gm-conv {
  display: grid; grid-template-columns: 44px 1fr auto; gap: 12px;
  padding: 12px 16px 12px 14px;
  border-bottom: 1px solid #f0f0f0;
  cursor: pointer; align-items: flex-start;
  position: relative;
  border-left: 3px solid transparent;
}
.gm-conv:hover { background: var(--wm-ns-050); }

.gm-conv--int.is-active {
  background: var(--wm-sb-200);
  border-left-color: var(--wm-sb-400);
}
.gm-conv--ext.is-active {
  background: #fff8e6;
  border-left-color: var(--wm-spark-500);
}

/* Avatars per kind */
.gm-conv__avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-sans); font-size: 13px; font-weight: 700;
  flex-shrink: 0;
  position: relative;
}
.gm-conv__avatar--int {
  background: var(--wm-sb-200);
  color: var(--wm-sb-500);
}
.gm-conv__avatar--ext {
  background: var(--wm-spark-400);
  color: #002d58;
  border-radius: 10px; /* squared off to differentiate */
}
.gm-conv__ext-marker {
  position: absolute;
  bottom: -3px; right: -6px;
  background: #002d58;
  color: var(--wm-spark-400);
  font-family: var(--font-sans); font-size: 8px; font-weight: 700;
  padding: 2px 4px;
  border-radius: 4px;
  border: 1.5px solid #fff;
  letter-spacing: 0.04em;
}

.gm-conv__col { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.gm-conv__name {
  font-family: var(--font-sans); font-size: 14px; font-weight: 700;
  color: var(--wm-ns-600);
  display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
}
.gm-conv__name time { font-size: 11px; font-weight: 400; color: var(--wm-ns-400); flex-shrink: 0; }
.gm-conv__sub {
  font-family: var(--font-sans); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.gm-conv--int .gm-conv__sub { color: var(--wm-sb-400); }
.gm-conv--ext .gm-conv__sub { color: #8a5a00; }
.gm-conv__preview {
  font-family: var(--font-sans); font-size: 13px; color: var(--wm-ns-400);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.gm-conv__unread {
  background: var(--wm-error-500); color: #fff;
  min-width: 20px; height: 20px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; padding: 0 6px;
  align-self: center;
}

/* Thread */
.gm-thread { background: var(--wm-ns-100); display: flex; flex-direction: column; position: relative; }
.gm-thread__head { background: #fff; border-bottom: 1px solid #f0f0f0; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: relative; }
.gm-thread__rail {
  position: absolute; left: 0; top: 0; bottom: -1px; width: 4px;
}
.gm-thread__rail--int { background: var(--wm-sb-400); }
.gm-thread__rail--ext { background: var(--wm-spark-400); }
.gm-thread--ext { background: #fffdf4; }
.gm-thread--ext .gm-thread__body {
  background:
    repeating-linear-gradient(45deg, transparent 0 22px, rgba(255,194,32,0.04) 22px 23px),
    #fffdf4;
}

.gm-thread__body { flex: 1; overflow-y: auto; padding: 24px; }
.gm-thread__day { text-align: center; font-family: var(--font-sans); font-size: 11px; font-weight: 700; color: var(--wm-ns-400); text-transform: uppercase; letter-spacing: 0.06em; margin: 8px 0 16px; position: relative; }
.gm-thread__day::before, .gm-thread__day::after {
  content: ""; position: absolute; top: 50%; width: 30%; height: 1px; background: var(--wm-ns-200);
}
.gm-thread__day::before { left: 10%; }
.gm-thread__day::after { right: 10%; }

/* Bubble rows */
.gm-bubble-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  margin-bottom: 12px;
}
.gm-bubble__avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-sans); font-size: 10px; font-weight: 700;
  flex-shrink: 0;
}
.gm-bubble__avatar--int { background: var(--wm-sb-200); color: var(--wm-sb-500); }
.gm-bubble__avatar--ext { background: var(--wm-spark-400); color: #002d58; border-radius: 8px; }

.gm-bubble {
  display: inline-block; max-width: 75%;
  padding: 10px 14px;
  border-radius: 16px;
  font-family: var(--font-sans); font-size: 14px; line-height: 1.4;
}
.gm-bubble--rx { background: #fff; color: var(--wm-ns-600); border: 1px solid #f0f0f0; border-bottom-left-radius: 4px; }
.gm-bubble--tx { background: var(--wm-sb-400); color: #fff; border-bottom-right-radius: 4px; }
.gm-bubble--rx.gm-bubble--ext {
  background: #fff;
  border: 1px solid #ffe9a3;
  border-bottom-left-radius: 4px;
  box-shadow: -2px 0 0 var(--wm-spark-400);
}
.gm-bubble__text { white-space: pre-wrap; }
.gm-bubble__time { font-size: 11px; opacity: 0.6; margin-top: 4px; display: block; }
.gm-bubble--tx .gm-bubble__time { opacity: 0.8; }

.gm-bubble__file {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: var(--wm-sb-200); border: 1px solid var(--wm-sb-300);
  border-radius: 8px;
  font-size: 13px; color: var(--wm-ns-600);
  margin-bottom: 6px;
}
.gm-bubble--tx .gm-bubble__file {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.25);
  color: #fff;

// ─────────────────────────────────────────────────────────────
// Kanban — Walmart-styled
// ─────────────────────────────────────────────────────────────
const KANBAN_COLUMNS = [
{ id: 'todo', title: 'Por hacer', count: 8 },
{ id: 'doing', title: 'En curso', count: 5 },
{ id: 'review', title: 'En revisión', count: 3 },
{ id: 'done', title: 'Hecho', count: 12 }];


const SAMPLE_TASKS = {
  todo: [
  { t: 'Revisar muestras Verano 25', who: 'Ana Soto', due: '12 dic', sub: 'Moda Mujer', prio: 'crit' },
  { t: 'Aprobar telas — Vestidos', who: 'María Pérez', due: '14 dic', sub: 'Moda Mujer' },
  { t: 'Brief proveedor Trends Co.', who: 'Juan Rivas', due: '15 dic', sub: 'Moda Mujer' }],

  doing: [
  { t: 'Fotos catálogo Otoño', who: 'Laura Vera', due: '10 dic', sub: 'Moda Mujer', prio: 'warn' },
  { t: 'Tech pack — Blusas', who: 'Ana Soto', due: '11 dic', sub: 'Moda Mujer' }],

  review: [
  { t: 'QA muestra final Pantalón', who: 'Pablo Lara', due: '09 dic', sub: 'Moda Mujer' }],

  done: [
  { t: 'Cierre tech pack Faldas', who: 'María Pérez', due: '01 dic', sub: 'Moda Mujer' },
  { t: 'Brief Verano 25', who: 'GM', due: '20 nov', sub: 'Moda Mujer' }]

};

const initials = (full) => full.split(' ').map((p) => p[0]).slice(0, 2).join('').toUpperCase();

const Kanban = ({ density = 'spacious', scope = 'todas las categorías' }) => {
  const compact = density === 'compact';

  const [tasks, setTasks] = React.useState(() => ({
    todo:   [...SAMPLE_TASKS.todo],
    doing:  [...SAMPLE_TASKS.doing],
    review: [...SAMPLE_TASKS.review],
    done:   [...SAMPLE_TASKS.done],
  }));
  const [dragging, setDragging] = React.useState(null); // { colId, task }
  const [dragOver, setDragOver]  = React.useState(null);

  // ── Filter state ──
  const [showFilters, setShowFilters] = React.useState(false);
  const [activePrios, setActivePrios] = React.useState(new Set());
  const [activeWhos,  setActiveWhos]  = React.useState(new Set());

  const allPeople = [...new Set(Object.values(tasks).flat().map(t => t.who.split(' ')[0]))].sort();
  const activeFilterCount = activePrios.size + activeWhos.size;

  const toggleSet = (setter, key) => setter(prev => {
    const s = new Set(prev); s.has(key) ? s.delete(key) : s.add(key); return s;
  });
  const clearFilters = () => { setActivePrios(new Set()); setActiveWhos(new Set()); };

  const applyFilters = (colTasks) => colTasks.filter(tk => {
    if (activePrios.size && !activePrios.has(tk.prio || 'none')) return false;
    if (activeWhos.size  && !activeWhos.has(tk.who.split(' ')[0])) return false;
    return true;
  });

  // ── Drag-and-drop (by task reference so filter indices don't break it) ──
  const onDragStart = (colId, task) => (e) => {
    setDragging({ colId, task });
    e.dataTransfer.effectAllowed = 'move';
  };
  const onDragOver = (colId) => (e) => {
    e.preventDefault();
    if (dragOver !== colId) setDragOver(colId);
  };
  const onDrop = (targetColId) => (e) => {
    e.preventDefault();
    if (!dragging || dragging.colId === targetColId) { setDragging(null); setDragOver(null); return; }
    const { colId: srcId, task } = dragging;
    setTasks(prev => ({
      ...prev,
      [srcId]:       prev[srcId].filter(t => t !== task),
      [targetColId]: [task, ...prev[targetColId]],
    }));
    setDragging(null); setDragOver(null);
  };
  const onDragEnd = () => { setDragging(null); setDragOver(null); };

  return (
    <div className="stack-md">
      {/* Header */}
      <div className="between">
        <div className="row" style={{ gap: 12 }}>
          <h3 className="gm-card__title">Tareas activas</h3>
          <Chip kind="neutral">{scope}</Chip>
        </div>
        <div className="row" style={{ gap: 8 }}>
          <Search placeholder="Filtrar tareas..." style={{ width: 200 }} />
          <Btn
            kind={activeFilterCount > 0 ? 'primary' : 'secondary'}
            size="sm"
            onClick={() => setShowFilters(f => !f)}
          >
            Filtros
            {activeFilterCount > 0 && (
              <span style={{ display:'inline-flex',alignItems:'center',justifyContent:'center',minWidth:16,height:16,borderRadius:8,background:'rgba(255,255,255,0.9)',color:'var(--wm-sb-600)',fontSize:10,fontWeight:700,padding:'0 3px',marginLeft:4 }}>
                {activeFilterCount}
              </span>
            )}
          </Btn>
          <Btn kind="primary" size="sm" onClick={() => window.__app?.openModal?.('task')}>+ Nueva tarea</Btn>
        </div>
      </div>

      {/* Inline filter panel */}
      {showFilters && (
        <div className="gm-kanban__filter-panel">
          <div className="gm-kanban__filter-group">
            <span className="gm-kanban__filter-label">Prioridad</span>
            {[{ id: 'crit', label: '● Crítico' }, { id: 'warn', label: '● Con alerta' }].map(p => (
              <button key={p.id}
                className={`gm-kanban__filter-chip${activePrios.has(p.id) ? ' is-active' : ''}`}
                onClick={() => toggleSet(setActivePrios, p.id)}>{p.label}</button>
            ))}
          </div>
          <div className="gm-kanban__filter-group">
            <span className="gm-kanban__filter-label">Responsable</span>
            {allPeople.map(p => (
              <button key={p}
                className={`gm-kanban__filter-chip${activeWhos.has(p) ? ' is-active' : ''}`}
                onClick={() => toggleSet(setActiveWhos, p)}>{p}</button>
            ))}
          </div>
          {activeFilterCount > 0 && (
            <button className="gm-kanban__filter-clear" onClick={clearFilters}>Limpiar filtros</button>
          )}
        </div>
      )}

      {/* Board */}
      <div className="gm-kanban">
        {KANBAN_COLUMNS.map((col) => {
          const colTasks  = applyFilters(tasks[col.id] || []);
          const totalInCol = (tasks[col.id] || []).length;
          const isOver    = dragOver === col.id && dragging?.colId !== col.id;
          return (
            <div key={col.id} className="gm-kanban__col"
              style={isOver ? { background:'var(--wm-sb-050)', outline:'2px dashed var(--wm-sb-300)', outlineOffset:-2, borderRadius:8 } : {}}
              onDragOver={onDragOver(col.id)}
              onDragLeave={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(null); }}
              onDrop={onDrop(col.id)}
            >
              <div className="gm-kanban__head">
                <span>{col.title}</span>
                <span className="gm-kanban__count">
                  {activeFilterCount > 0 ? `${colTasks.length}/${totalInCol}` : colTasks.length}
                </span>
              </div>

              {colTasks.map((tk, i) => {
                const isDraggingThis = dragging?.task === tk;
                return (
                  <div key={i}
                    className={`gm-task${compact ? ' gm-task--compact' : ''}`}
                    draggable
                    style={{ cursor:'grab', opacity: isDraggingThis ? 0.35 : 1, transform: isDraggingThis ? 'scale(0.96)' : 'none', transition:'opacity .15s, transform .15s' }}
                    onDragStart={onDragStart(col.id, tk)}
                    onDragEnd={onDragEnd}
                  >
                    <div className="gm-task__title">{tk.t}</div>
                    {!compact && tk.sub ? <Chip kind="neutral">{tk.sub}</Chip> : null}
                    <div className="gm-task__meta">
                      <span className="row" style={{ gap: 6 }}>
                        <Avatar initials={initials(tk.who)} size="sm" />
                        {!compact ? <span>{tk.who.split(' ')[0]}</span> : null}
                      </span>
                      <span className="row" style={{ gap: 6 }}>
                        {tk.prio === 'crit' ? <Sev level="crit" /> : tk.prio === 'warn' ? <Sev level="warn" /> : null}
                        <span>{tk.due}</span>
                      </span>
                    </div>
                  </div>
                );
              })}

              {activeFilterCount > 0 && colTasks.length === 0 && (
                <div style={{ padding:'12px 0', textAlign:'center', fontSize:12, fontFamily:'var(--font-sans)', color:'var(--wm-ns-400)' }}>
                  Sin resultados
                </div>
              )}
              {isOver && (
                <div style={{ textAlign:'center', padding:'10px 0', fontSize:12, fontFamily:'var(--font-sans)', color:'var(--wm-sb-400)', fontWeight:600 }}>
                  Soltar aquí ↓
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

};

// ─────────────────────────────────────────────────────────────
const MENTION_PRENDAS = [
  { name: 'Vestidos',   ref: 'REF-038', fase: 'Contramuestra', estado: 'enCurso' },
  { name: 'Blusas',     ref: 'REF-019', fase: 'Producción',    estado: 'bloqueada' },
  { name: 'Pantalones', ref: 'REF-034', fase: 'Calidad',        estado: 'enCurso' },
  { name: 'Tops',       ref: 'REF-021', fase: 'Diseño',         estado: 'retrasada' },
];

const ESTADO_COLOR_MAP = {
  enCurso:    '#2563eb',
  bloqueada:  '#dc2626',
  retrasada:  '#d97706',
  completada: '#16a34a',
};

const SmartComposer = ({ placeholder, kind = 'int' }) => {
  const [text,    setText]   = React.useState('');
  const [picker,  setPicker] = React.useState(false);
  const [query,   setQuery]  = React.useState('');
  const [pending, setPending]= React.useState(null); // prenda attached
  const [sent,    setSent]   = React.useState([]);   // sent bubbles

  const filtered = MENTION_PRENDAS.filter(p =>
    !query ||
    p.name.toLowerCase().startsWith(query.toLowerCase()) ||
    p.ref.toLowerCase().includes(query.toLowerCase())
  );

  const handleChange = (e) => {
    const val = e.target.value;
    setText(val);
    const atMatch  = val.match(/@([^\s@]*)$/);
    const refMatch = val.match(/\bREF-?\w*$/i);
    if (atMatch)       { setPicker(true);  setQuery(atMatch[1]); }
    else if (refMatch) { setPicker(true);  setQuery(''); }
    else               { setPicker(false); setQuery(''); }
  };

  const selectPrend = (p) => {
    const cleaned = text.replace(/@[^\s@]*$/, '').replace(/\bREF-?\w*$/i, '').trimEnd();
    setText(cleaned + (cleaned ? ' ' : '') + `@${p.name} `);
    setPending(p);
    setPicker(false);
    setQuery('');
  };

  const openPicker = () => {
    setText(t => t + '@');
    setPicker(true);
    setQuery('');
  };

  const handleSend = () => {
    if (!text.trim() && !pending) return;
    setSent(prev => [...prev, { text: text.trim(), prenda: pending }]);
    setText('');
    setPending(null);
    setPicker(false);
  };

  return (
    <div>
      {/* Rendered sent bubbles */}
      {sent.map((b, i) => (
        <div key={i} className="gm-bubble-row" style={{ justifyContent: 'flex-end' }}>
          <div className={`gm-bubble gm-bubble--tx`}>
            {b.prenda && (
              <PrendaRefCard
                name={b.prenda.name}
                refCode={b.prenda.ref}
                step={`${b.prenda.fase} · Verano 25`}
                severity={b.prenda.estado === 'bloqueada' ? 'crit' : b.prenda.estado === 'retrasada' ? 'warn' : 'normal'}
              />
            )}
            {b.text && <div className="gm-bubble__text">{b.text}</div>}
            <span className="gm-bubble__time">ahora</span>
          </div>
        </div>
      ))}

      {/* Pending prenda badge */}
      {pending && (
        <div style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 20px',
                      background:'var(--wm-sb-050)', borderTop:'1px solid var(--wm-sb-100)',
                      fontFamily:'var(--font-sans)', fontSize:12 }}>
          <span style={{ fontWeight:700, color:'var(--wm-sb-500)', background:'var(--wm-sb-100)',
                         padding:'2px 7px', borderRadius:4 }}>{pending.ref}</span>
          <span style={{ color:'var(--wm-ns-600)' }}>{pending.name} · {pending.fase}</span>
          <span style={{ marginLeft:'auto', fontSize:10, color: ESTADO_COLOR_MAP[pending.estado] }}>●&nbsp;
            {pending.estado === 'bloqueada' ? 'Bloqueada' : pending.estado === 'retrasada' ? 'Retrasada' : 'En curso'}
          </span>
          <button style={{ border:'none', background:'none', cursor:'pointer', color:'var(--wm-ns-400)', fontSize:18, lineHeight:1, padding:'0 4px' }}
            onClick={() => setPending(null)}>×</button>
        </div>
      )}

      {/* Composer + picker */}
      <div style={{ position: 'relative' }}>
        {picker && filtered.length > 0 && (
          <div className="gm-mention-picker">
            <div className="gm-mention-picker__head">
              Mencionar prenda{query ? ` · "${query}"` : ' — escribe para filtrar'}
            </div>
            {filtered.map(p => (
              <button key={p.ref} className="gm-mention-picker__item" onClick={() => selectPrend(p)}>
                <span className="gm-mention-picker__ref">{p.ref}</span>
                <span className="gm-mention-picker__name">{p.name}</span>
                <span className="gm-mention-picker__fase">{p.fase}</span>
                <span style={{ fontSize:10, color: ESTADO_COLOR_MAP[p.estado] }}>●</span>
              </button>
            ))}
          </div>
        )}
        <div className="gm-thread__composer">
          <Btn kind="secondary" size="sm">📎 Adjuntar</Btn>
          <Btn kind="secondary" size="sm" onClick={openPicker}>@ Mencionar</Btn>
          <div className="gm-field" style={{ flex: 1 }}>
            <input
              value={text}
              onChange={handleChange}
              onKeyDown={e => { if (e.key === 'Escape') setPicker(false); if (e.key === 'Enter' && !picker) handleSend(); }}
              placeholder={placeholder}
            />
          </div>
          <Btn kind="primary" size="sm" onClick={handleSend}>Enviar</Btn>
        </div>
      </div>
    </div>
  );
};

      {expanded && (

const TOOL_SCREENS = ['calendario', 'colecciones', 'documentos', 'kpis'];

const TOOL_ITEMS = [

  { id: 'kpis',        icon: '📊', label: 'Reportes',          sub: 'y KPIs',        desc: 'Métricas del proceso de diseño' },

const CTX_LABEL = {
  'moda':       'Moda',
  'moda-mujer': 'Moda Mujer',
};

// Maps router screen → nav item id, so active state is always correct
const SCREEN_TO_NAV = {
  panel:       'inicio',
  moda:        'moda',
  'moda-mujer':'moda',
  calendario:  'herramientas',
  colecciones: 'herramientas',
  documentos:  'herramientas',
  kpis:        'herramientas',
  finanzas:    'herramientas',
  paso1:       'moda',
  paso6:       'moda',
  paso10:      'moda',
};

const NavMasthead = ({ active = '', unread = 3 }) => {
  const { navigate, screen: currentScreen, setToolCtx } = React.useContext(RouterCtx);
  const [toolsOpen, setToolsOpen] = React.useState(false);
  const toolsWrapRef = React.useRef(null);

  // Always derive active nav from RouterCtx — never rely on the prop alone
  const navActive = SCREEN_TO_NAV[currentScreen] || active;
  const ctxLabel  = CTX_LABEL[currentScreen] || null;

  // Close dropdown on outside click
  React.useEffect(() => {
    if (!toolsOpen) return;
    const handler = (e) => {
      if (toolsWrapRef.current && !toolsWrapRef.current.contains(e.target)) {
        setToolsOpen(false);
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [toolsOpen]);

  const handleToolNav = (toolId) => {
    const ctx = CTX_LABEL[currentScreen] ? currentScreen : null;
    setToolCtx(ctx);
    setToolsOpen(false);
    navigate(toolId);
  };

  return (
    <header className="gm-mast">
      <div className="gm-mast__logo">
        <WalmartWord size={22} />
        <SparkMark style={{ width: 24, height: 24, color: 'var(--wm-spark-400)' }} />

          <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', opacity: 0.7, pointerEvents: 'none', color: '#fff', fontSize: 14 }}>🔍</span>
        </div>
      </div>
      <nav className="gm-mast__nav">
        {NAV_ITEMS_P.map((n) => {
          // ── Herramientas — same submenu style as Moda ───────────────
          if (n.id === 'herramientas') {
            return (
              <div key={n.id} className="gm-mast__nav-wrap" ref={toolsWrapRef}>
                <button
                  className={`gm-mast__nav-item${navActive === 'herramientas' ? ' is-active' : ''}`}
                  onClick={() => setToolsOpen(o => !o)}
                >
                  {n.label}
                  <span className="gm-mast__nav-caret" aria-hidden="true">▾</span>
                </button>
                <div className="gm-mast__submenu" role="menu" style={{
                  position: 'fixed', top: 58, right: 8, left: 'auto',
                  ...(toolsOpen ? { opacity: 1, visibility: 'visible', transform: 'translateY(0)' } : {})
                }}>
                  <div className="gm-mast__submenu-head">Herramientas</div>
                  {ctxLabel && (
                    <div style={{ margin: '0 10px 4px', padding: '5px 8px', background: 'var(--wm-sb-050)', borderRadius: 5, display: 'flex', alignItems: 'center', gap: 6 }}>
                      <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--wm-sb-400)', flexShrink: 0 }}></span>
                      <span style={{ fontSize: 11, color: 'var(--wm-sb-600)', fontFamily: 'var(--font-sans)', fontWeight: 600 }}>Contexto: {ctxLabel}</span>
                    </div>
                  )}
                  {TOOL_ITEMS.map(tool => (
                    <div key={tool.id} className="gm-mast__sub-wrap">
                      <a href="#" className="gm-mast__sub-item" role="menuitem"
                        onClick={(e) => { e.preventDefault(); handleToolNav(tool.id); }}>
                        <span>{tool.label} {tool.sub}</span>
                        <span className="gm-mast__sub-chev">›</span>
                      </a>
                    </div>
                  ))}
                </div>
              </div>
            );
          }

          // ── Regular nav items ───────────────────────────────────────
          const subs = NAV_SUBCATS[n.id];
          const hasSubs = Array.isArray(subs) && subs.length > 0;
          return (
            <div key={n.id} className="gm-mast__nav-wrap">
              <button
                className={`gm-mast__nav-item${n.id === navActive ? ' is-active' : ''}${n.disabled ? ' is-disabled' : ''}`}
                disabled={n.disabled}
                onClick={n.disabled ? undefined : () => navigate(MASTHEAD_SCREEN[n.id] || 'panel')}
              >
                {n.label}
                {hasSubs ? <span className="gm-mast__nav-caret" aria-hidden="true">▾</span> : null}
              </button>
              {hasSubs && (
                <div className="gm-mast__submenu" role="menu">
                  <div className="gm-mast__submenu-head">{n.label}</div>
                  {subs.map((s) => {
                    const hasFlyout = s.id === 'mujer' && !s.disabled;
                    return (
                      <div key={s.id} className="gm-mast__sub-wrap">
                        <a
                          href="#"
                          className={`gm-mast__sub-item${s.disabled ? ' is-disabled' : ''}`}
                          role="menuitem"
                          onClick={s.disabled ? undefined : (e) => {
                            e.preventDefault();
                            navigate(s.id === 'mujer' ? 'moda-mujer' : 'moda');
                          }}
                        >
                          <span>{s.label}</span>
                          {s.disabled
                            ? <span className="gm-mast__sub-chip">próximamente</span>
                            : <span className="gm-mast__sub-chev">›</span>}
                        </a>
                        {hasFlyout && (
                          <div className="gm-mast__subflyout" role="menu">
                            <div className="gm-mast__flyout-head">Flujo de trabajo</div>
                            {FASES_NAV.map((fase, idx) => (
                              <button

                          </div>

                    );

                </div>
              )}
            </div>
          );
        })}
      </nav>
      <div className="gm-mast__actions">
        <button
          className={`gm-mast__btn gm-mast__btn--comms${active === 'comms' ? ' is-active' : ''}`}
          onClick={() => navigate('comms')}
        >
          <span className="gm-mast__btn-icon"><CommsIcon size={18} /></span>
          <span>Comunicaciones</span>
          {unread > 0 ? <span className="gm-mast__btn-badge">{unread}</span> : null}
        </button>
        <span className="gm-mast__avatar" style={{background:'#1E3A5F',color:'#FFC220',border:'1.5px solid #FFC220'}} title="Equipo Comercial">CQ</span>
      </div>
    </header>
  );
};

            <div style={{ display: 'flex', gap: 16, marginTop: 10 }}>

                <span key={l} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 11, color: 'var(--wm-ns-600)', fontFamily: 'var(--font-sans)' }}>
                  <span style={{ width: 10, height: 10, borderRadius: 2, background: c, display: 'inline-block' }}></span>{l}
                </span>
              ))}
            </div>
          </div>
          <div className="gm-card">
            <CardHead title="Por colección" />
            <div style={{ marginTop: 12 }}>
              {FIN_COLLECTIONS.map((c, i) => {
                const pct = Math.round((c.ejecutado / c.presupuesto) * 100);
                return (
                  <div key={i} style={{ marginBottom: 14 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--wm-ns-700)', fontFamily: 'var(--font-sans)' }}>{c.name}</span>
                      <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--wm-ns-600)', fontFamily: 'var(--font-sans)' }}>{pct}%</span>
                    </div>
                    <div style={{ height: 6, borderRadius: 3, background: 'var(--wm-ns-100)', overflow: 'hidden' }}>
                      <div style={{ height: '100%', width: `${pct}%`, background: pct > 90 ? '#dc2626' : 'var(--wm-sb-400)', borderRadius: 3 }}></div>
                    </div>
                    <div style={{ marginTop: 2 }}>
                      <span style={{ fontSize: 11, color: 'var(--wm-ns-400)', fontFamily: 'var(--font-sans)' }}>Ejec. ${(c.ejecutado/1000).toFixed(0)}K / ${(c.presupuesto/1000).toFixed(0)}K</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};


// ── iPad Bezel Simulator ──────────────────────────────────────────────────────
const IPadDevice = ({ children, width = 1180, height = 820, style = {} }) => {
  return (
    <div style={{
      width, height, borderRadius: 34, background: '#0b0b0d', padding: 13,
      boxShadow: '0 40px 90px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.3)',
      position: 'relative', boxSizing: 'content-box', ...style
    }}>
      {/* Front camera centered on top long edge */}
      <div style={{
        position: 'absolute', top: 6, left: '50%', transform: 'translateX(-50%)',
        width: 7, height: 7, borderRadius: '50%', background: '#1f2024', border: '1px solid #303236'
      }} />
      {/* Screen container */}
      <div style={{
        width: '100%', height: '100%', borderRadius: 22, overflow: 'hidden', background: '#fff',
        position: 'relative', display: 'flex', flexDirection: 'column',
        fontFamily: 'var(--font-sans)', WebkitFontSmoothing: 'antialiased'
      }}>
        {children}
      </div>
    </div>
  );
};

// ── Scaling Wrapper to keep the iPad Emulator responsive ────────────────────────
const IPadWrapper = ({ children }) => {
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const handleResize = () => {
      const padW = 1180 + 26; // total pad width with padding
      const padH = 820 + 26;  // total pad height with padding
      const winW = window.innerWidth * 0.95; // leave 5% margin
      const winH = window.innerHeight * 0.95;
      const scaleW = winW / padW;
      const scaleH = winH / padH;
      const finalScale = Math.min(scaleW, scaleH, 1); // scale down, but do not zoom in past 100%
      setScale(finalScale);
    };
    window.addEventListener('resize', handleResize);
    handleResize();
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  return (
    <div className="ipad-desk-container">
      <div style={{
        transform: `scale(${scale})`,
        transformOrigin: 'center center',
        transition: 'transform 0.1s ease-out',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        flexShrink: 0
      }}>
        {children}
      </div>
    </div>
  );
};

// ── Root app ──────────────────────────────────────────────────────────────────
const ProtoApp = () => {
  const [screen,       setScreen]       = React.useState('splash');
  const [toast,        setToast]        = React.useState(null);
  const [modal,        setModal]        = React.useState(null);
  const [filterCtx,    setFilterCtx]    = React.useState(null);
  const [selectedStep, setSelectedStep] = React.useState(null);
  const [toolCtx,      setToolCtx]      = React.useState(null);

  const navigate    = (s)   => setScreen(s);
  const showToast   = (msg) => setToast(msg);
  const openModal   = (t)   => setModal(t);
  const openFilters = (ctx) => setFilterCtx(ctx);

  // Expose to screens.jsx components via window
  window.__app = { showToast, openModal, openFilters, setStep: setSelectedStep, navigate, setToolCtx };

  // Auto-advance splash
  React.useEffect(() => {
    if (screen !== 'splash') return;
    const t = setTimeout(() => setScreen('login'), 2500);
    return () => clearTimeout(t);
  }, [screen]);

  return (
    <RouterCtx.Provider value={{ navigate, screen, selectedStep, toolCtx, setToolCtx, showToast, openModal, openFilters }}>
      <div style={{ height: '100%' }}>
        {screen === 'splash'      && <div onClick={() => navigate('login')} style={{ cursor: 'pointer', height: '100%' }}><SplashScreen /></div>}
        {screen === 'login'       && <LoginScreenNav navigate={navigate} />}
        {screen === 'panel'       && <PanelControlCompradores />}
        {screen === 'comms'       && <CommsScreen />}
        {screen === 'moda'        && <ModaGeneral density="spacious" />}
        {screen === 'moda-mujer'  && <ModaMujer selectedStep={selectedStep} />}
        {screen === 'calendario'  && <CalendarioScreen  toolCtx={toolCtx} />}
        {screen === 'colecciones' && <ColeccionesPasadas toolCtx={toolCtx} />}
        {screen === 'documentos'  && <DocumentosScreen  toolCtx={toolCtx} />}
        {screen === 'kpis'        && <KPIsScreen        toolCtx={toolCtx} />}
        {screen === 'finanzas'    && <FinanzasScreen />}
        {screen === 'paso1'       && <Paso1Screen />}
        {screen === 'paso6'       && <Paso6Screen />}
        {screen === 'paso10'      && <Paso10Screen />}

        {/* Global overlays */}
        {filterCtx && <FilterSidebar ctx={filterCtx} onClose={() => setFilterCtx(null)} />}
        {modal     && <AppModal type={modal} onClose={() => setModal(null)} />}
        {toast     && <Toast message={toast} onDone={() => setToast(null)} />}
      </div>
    </RouterCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(
  <IPadWrapper>
    <IPadDevice>
      <ProtoApp />
    </IPadDevice>
  </IPadWrapper>
);

</script>
</body>
</html>
