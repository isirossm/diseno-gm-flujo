<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diseño GM · Flujo de Producción — Walmart Chile</title>
  <link rel="icon" type="image/png" href="../Img/Logo fav.png">
  <link rel="stylesheet" href="_ds/walmart-design-system-a4d4052c-f342-4f6e-91ce-0b7b19d4cfe9/colors_and_type.css">
  <link rel="stylesheet" href="lib/platform.css">
  <style>
    #root { height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <pre id="errbox" style="white-space:pre-wrap;color:#b00;font:13px monospace;padding:16px;display:none"></pre>
  <script>
    window.addEventListener("error", function (ev) {
      var b = document.getElementById("errbox");
      if (!b) return;
      b.style.display = "block";
      b.textContent += "\n" + (ev.message || "err") + "\n" + (ev.filename || "") + ":" + (ev.lineno || "") + "\n" + (ev.error && ev.error.stack ? ev.error.stack : "");
    });
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script src="_ds/walmart-design-system-a4d4052c-f342-4f6e-91ce-0b7b19d4cfe9/_ds_bundle.js"></script>

  <script src="app/data.js"></script>
  <script src="app/icons.js"></script>
  <script src="app/components.js"></script>
  <script src="app/chrome.js?v=2"></script>
  <script src="app/screen_inicio.js?v=3"></script>
  <script src="app/screen_tendencias.js"></script>
  <script src="app/screen_viaje.js"></script>
  <script src="app/screen_coleccion.js"></script>
  <script src="app/screen_muestras.js"></script>
  <script src="app/screen_fichas.js"></script>
  <script src="app/screen_percheros.js"></script>
  <script src="app/screen_kv.js"></script>
  <script src="app/screen_contramuestras.js"></script>
  <script src="app/screen_manuales.js?v=2"></script>
  <script src="app/screen_negociacion.js"></script>
  <script src="app/screen_fichas_revisadas.js"></script>
  <script src="app/screen_cierre.js"></script>
  <script src="app/screen_validacion.js"></script>
  <script src="app/screen_tools.js"></script>
  <script src="app/app.js"></script>
  <script>
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(window.GMApp));
  </script>

  <!-- Tweaks panel (JSX → Babel) -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/tweaks.jsx"></script>
</body>
</html>
