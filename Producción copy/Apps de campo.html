<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diseño GM · Apps de campo — Walmart Chile</title>
  <link rel="icon" type="image/png" href="../Img/Logo fav.png">
  <link rel="stylesheet" href="_ds/walmart-design-system-a4d4052c-f342-4f6e-91ce-0b7b19d4cfe9/colors_and_type.css">
  <link rel="stylesheet" href="lib/platform.css">
  <style>
    body { background: var(--wm-ns-100); }
    body.embed { background: transparent; }
    .field-wrap { min-height: 100vh; padding: 0 0 80px; }
    body.embed .field-wrap { padding: 32px 0 48px; min-height: unset; }
    .field-top {
      position: sticky; top: 0; z-index: 10; background: var(--wm-sb-400); color: #fff;
      display: flex; align-items: center; gap: 14px; padding: 16px 32px;
    }
    .field-top a { color: #fff; text-decoration: none; display: inline-flex; align-items: center; gap: 7px; font-weight: 600; font-size: 14px; opacity: .9; }
    .field-top a:hover { opacity: 1; text-decoration: underline; }
    .field-section { max-width: 1280px; margin: 0 auto; padding: 48px 32px 0; }
    .field-section__head { margin-bottom: 32px; }
    .field-section__eyebrow { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--wm-sb-400); }
    .field-section__title { font-size: 30px; font-weight: 700; margin: 6px 0 0; letter-spacing: -.01em; }
    .field-section__sub { font-size: 15px; color: var(--wm-ns-300); margin: 8px 0 0; max-width: 720px; line-height: 1.55; }
    .field-divider { max-width: 1280px; margin: 56px auto 0; border: none; border-top: 1px solid var(--wm-ns-200); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script src="_ds/walmart-design-system-a4d4052c-f342-4f6e-91ce-0b7b19d4cfe9/_ds_bundle.js"></script>

  <!-- GM data + shared (plain JS) -->
  <script src="app/data.js"></script>
  <script src="app/icons.js"></script>
  <script src="app/components.js"></script>
  <script src="apps/ipad-frame.js"></script>
  <script src="apps/viaje.js"></script>
  <script src="apps/negociacion.js"></script>

  <!-- iOS frame (JSX) + render (run after Babel loads, in document order) -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel">
    const e = React.createElement;
    const _only = new URLSearchParams(location.search).get("only");
    if (_only) document.body.classList.add("embed");

    function FieldRoot() {
      if (_only === "viaje") {
        return e("div", { className: "field-wrap" },
          e("div", { className: "field-section" }, e(window.ViajeField)));
      }
      if (_only === "negociacion") {
        return e("div", { className: "field-wrap" },
          e("div", { className: "field-section" }, e(window.NegociacionField)));
      }
      return e("div", { className: "field-wrap" },
        e("div", { className: "field-top" },
          e("a", { href: "Flujo de Producción.html" }, e(window.GMIcon.chevronLeft, { size: 16 }), "Volver a la plataforma"),
          e("div", { style: { width: 1, height: 20, background: "rgba(255,255,255,.3)" } }),
          e("span", { style: { fontWeight: 700, fontSize: 15 } }, "Apps de campo"),
          e("span", { style: { fontSize: 13, color: "rgba(255,255,255,.75)" } }, "· companions móviles de Diseño GM")),

        e("div", { className: "field-section" },
          e("div", { className: "field-section__head" },
            e("div", { className: "field-section__eyebrow" }, "Fase 1 · Viaje · iPhone"),
            e("h1", { className: "field-section__title" }, "App Viaje"),
            e("p", { className: "field-section__sub" }, "Valentina la usa durante el viaje de tendencias. Registra cada compra fotografiando la boleta y consulta el wishlist para saber qué buscar. Ambas pantallas son la misma app — abajo se muestran lado a lado y comparten datos en vivo.")),
          e(window.ViajeField)),

        e("hr", { className: "field-divider" }),

        e("div", { className: "field-section" },
          e("div", { className: "field-section__head" },
            e("div", { className: "field-section__eyebrow" }, "Fase 4 · Negociación · iPad"),
            e("h1", { className: "field-section__title" }, "App Negociación"),
            e("p", { className: "field-section__sub" }, "En el viaje a China, Valentina revisa físicamente cada prenda con el proveedor: abre la ficha del SKU, anota sobre la imagen y edita los campos que se negocian. Todo sincroniza en tiempo real con la plataforma.")),
          e(window.NegociacionField)));
    }
    ReactDOM.createRoot(document.getElementById("root")).render(e(FieldRoot));
  </script>
</body>
</html>
