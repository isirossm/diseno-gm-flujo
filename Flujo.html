<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diseño GM · Renata González · Admin</title>
  <link rel="icon" type="image/png" href="Img/Logo fav.png" />
  <link rel="stylesheet" href="gm-design-system.css" />
  <link rel="stylesheet"
    href="App 4/App/_ds/walmart-design-system-a4d4052c-f342-4f6e-91ce-0b7b19d4cfe9/colors_and_type.css" />
  <link rel="stylesheet" href="App 4/App/lib/platform.css" />
  <link rel="stylesheet" href="App 4/App/lib/gestion.css" />
  <style>
    html,
    body,
    #root {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--wm-ns-050);
    }

    /* ── App Shell Layout ────────────────────────────────── */
    .app-shell {
      background: var(--wm-ns-100);
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      font-family: var(--font-sans);
      color: var(--color-fg);
      overflow: hidden;
    }

    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .app-main {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    /* ── Left navigation sidebar ─────────────────────────── */
    .gm-navsidebar {
      position: relative;
      width: 72px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid var(--wm-ns-100);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 2px;
      z-index: 10;
    }

    .gm-navsidebar__item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 64px;
      padding: 10px 4px;
      border: none;
      background: transparent;
      border-radius: 10px;
      cursor: pointer;
      color: var(--wm-ns-400);
      transition: background .12s, color .12s;
      font-family: var(--font-sans);
    }

    .gm-navsidebar__item:hover {
      background: var(--wm-ns-050);
      color: var(--wm-ns-600);
    }

    .gm-navsidebar__item.is-active {
      background: #EEF4FF;
      color: var(--wm-sb-400);
    }

    .gm-navsidebar__icon {
      font-size: 20px;
      line-height: 1;
    }

    .gm-navsidebar__label {
      font-size: 10px;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"

    crossorigin="anonymous"></script>

  <!-- App 4 design system bundles and scripts -->
  <script src="App 4/App/_ds/walmart-design-system-a4d4052c-f342-4f6e-91ce-0b7b19d4cfe9/_ds_bundle.js"></script>

  <script src="App 4/App/app/screen_moda.js"></script>
  <script src="App 4/App/app/screen_moda_mujer.js"></script>
  <script src="App 4/App/app/screen_correo.js"></script>
  <script src="App 4/App/app/screen_calendario.js"></script>
  <script src="App 4/App/app/screen_documentos.js"></script>
  <script src="App 4/App/app/screen_historial.js"></script>

  <script type="text/babel">
    // wf-primitives.jsx
    /* global React */

    const ProdImg = window.GMUI ? window.GMUI.ProdImg : null;

    const PROFILES = [
      {
        email: 'renatta.crovetto@walmart.cl',
        name: 'Renatta Crovetto',
        initials: 'RC',
        role: 'Diseñadora Senior',
        access: 'full',
        avatar: 'Img/Usuarios/Renatta Crovetto.jpeg'
      },
      {
        email: 'valentina.diaz@walmart.cl',
        name: 'Valentina Díaz',
        initials: 'VD',
        role: 'Diseñadora Moda',
        access: 'moda',
        avatar: 'Img/Usuarios/Valentina Diaz.jpeg'
      },
      {
        email: 'compradores@walmart.cl',
        name: 'Compradores',
        initials: 'CO',
        role: 'Comprador',
        access: 'compras',
        avatar: null
      },
      {
        email: 'practicante@walmart.cl',
        name: 'Practicante GM',
        initials: 'PR',
        role: 'Practicante',
        access: 'practicante',
        avatar: null
      }
    ];

    // ── UserAvatar: muestra foto de perfil o iniciales como fallback ──────────────
    const UserAvatar = ({ profile, size = 32, style: extraStyle = {} }) => {
      const [imgError, setImgError] = React.useState(false);
      const showImg = profile && profile.avatar && !imgError;
      const baseStyle = {
        width: size, height: size, borderRadius: '50%',
        flexShrink: 0, display: 'inline-flex', alignItems: 'center',
        justifyContent: 'center', overflow: 'hidden',
        ...extraStyle
      };
      if (showImg) {
        return (
          <span style={baseStyle}>
            <img
              src={profile.avatar}
              alt={profile.name}
              onError={() => setImgError(true)}
              style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: '50%', display: 'block' }}
            />
          </span>
        );
      }
      return (
        <span style={{
          ...baseStyle,
          background: 'var(--wm-sb-300)',
          color: '#fff',
          fontWeight: 700,
          fontSize: Math.round(size * 0.375),
          fontFamily: 'var(--font-sans)'
        }}>
          {profile ? profile.initials : '?'}
        </span>
      );
    };

    const isScreenAllowed = (user, scr) => {
      if (!user) return false;
      if (user.access === 'full') return true; // Renata has access to everything

      if (user.access === 'moda' || user.access === 'compras') { // Valentina and Compradores
        // Can access everything EXCEPT general panel (Inicio) and general moda overview (Moda)
        return !['panel', 'moda'].includes(scr);
      }
      if (user.access === 'practicante') { // Practicante
        // Practicante only has access to fichas, comms, calendario, documentos
        return ['fichas', 'comms', 'calendario', 'documentos'].includes(scr);
      }
      return false;
    };

    // ─────────────────────────────────────────────────────────────
    // Walmart Spark — official 6-point mark, inline SVG
    // ─────────────────────────────────────────────────────────────
    const SparkMark = ({ className = 'spark', style }) =>
      <span className={className} style={style}>
        <svg viewBox="0 0 139.762 157.183" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="M 62.785 48.529 L 59.162 7.407 C 59.162 3.34 63.905 0 69.874 0 C 75.843 0 80.604 3.34 80.604 7.407 L 76.972 48.529 C 76.564 51.006 73.546 52.916 69.87 52.916 C 66.194 52.916 63.185 51.006 62.785 48.529 Z M 47.689 65.754 C 49.525 62.563 49.384 58.994 47.443 57.405 L 13.706 33.698 C 10.201 31.665 4.939 34.111 1.953 39.296 C -1.043 44.476 -0.511 50.263 2.994 52.296 L 40.345 69.724 C 42.686 70.595 45.858 68.936 47.689 65.754 Z M 92.073 65.754 C 93.909 68.94 97.075 70.595 99.412 69.724 L 136.768 52.296 C 140.286 50.267 140.791 44.476 137.818 39.296 C 134.818 34.111 129.552 31.665 126.051 33.698 L 92.314 57.405 C 90.386 58.994 90.237 62.568 92.073 65.754 Z M 62.785 108.658 L 59.162 149.78 C 59.162 153.851 63.905 157.183 69.874 157.183 C 75.843 157.183 80.604 153.851 80.604 149.78 L 76.972 108.658 C 76.564 106.185 73.546 104.279 69.87 104.279 C 66.194 104.279 63.185 106.181 62.785 108.658 Z M 92.314 99.804 L 126.051 123.494 C 129.547 125.523 134.818 123.067 137.818 117.896 C 140.791 112.712 140.286 106.92 136.768 104.882 L 99.412 87.477 C 97.075 86.597 93.913 88.247 92.073 91.438 C 90.237 94.619 90.386 98.197 92.314 99.804 Z M 40.345 87.472 L 2.994 104.878 C -0.511 106.916 -1.043 112.707 1.953 117.891 C 4.939 123.058 10.201 125.518 13.706 123.489 L 47.443 99.799 C 49.384 98.193 49.525 94.619 47.689 91.433 C 45.853 88.243 42.682 86.588 40.345 87.472 Z"></path>
        </svg>
      </span>;


    // Walmart wordmark — inline SVG so we don't depend on the PNG inside bundle.
    // Drawn approximate (italic "Walmart"). The bundle picks up the PNG if used as <img>.
    const WalmartWordmark = ({ height = 22, color = '#fff' }) =>
      <img
        src="design-system/walmart-logo-primary.png"
        alt="Walmart"
        style={{ height, width: 'auto', display: 'block', filter: color === '#fff' ? 'brightness(0) invert(1)' : 'none' }} />;



    // White-mode wordmark (text-based, so the masthead can use any color)
    const WalmartWord = ({ size = 22, color = '#fff' }) =>
      <span style={{

        fontWeight: 700,
        fontSize: size,
        letterSpacing: '-0.01em',
        color,
        fontStyle: 'italic',
        lineHeight: 1, fontFamily: "Bogle"
      }}>Walmart</span>;


    // ─────────────────────────────────────────────────────────────
    // Masthead — Walmart blue, adapted for the internal platform
    // ─────────────────────────────────────────────────────────────
    // Subcategorías por categoría — se muestran en el menú hover del masthead
    const NAV_SUBCATS = {
      moda: [
        { id: 'mujer', label: 'Vestuario Mujer' },
        { id: 'hombre', label: 'Vestuario Hombre', disabled: true },
        { id: 'infantil', label: 'Vestuario Infantil', disabled: true },
        { id: 'baby', label: 'Vestuario Baby', disabled: true },
        { id: 'calzado', label: 'Calzado', disabled: true },
        { id: 'interior', label: 'Ropa Interior', disabled: true }],

      casa: [
        { id: 'deco', label: 'Decoración', disabled: true },
        { id: 'mueble', label: 'Muebles', disabled: true },
        { id: 'mesa', label: 'Mesa y cocina', disabled: true },
        { id: 'textil', label: 'Textil hogar', disabled: true }],

      electro: [
        { id: 'linea-blanca', label: 'Línea blanca', disabled: true },
        { id: 'tv-audio', label: 'TV y audio', disabled: true },
        { id: 'computacion', label: 'Computación', disabled: true },
        { id: 'celulares', label: 'Celulares', disabled: true }],

      hardlines: [
        { id: 'deportes', label: 'Deportes', disabled: true },
        { id: 'herramientas', label: 'Herramientas', disabled: true },
        { id: 'juguetes', label: 'Juguetes', disabled: true },
        { id: 'automotriz', label: 'Automotriz', disabled: true },
        { id: 'mascotas', label: 'Mascotas', disabled: true }]

    };

    const NAV_ITEMS = [
      { id: 'inicio', label: 'Inicio' },
      { id: 'moda', label: 'Vestuario' },
      { id: 'casa', label: 'Casa', disabled: true },
      { id: 'electro', label: 'Electro', disabled: true },
      { id: 'hardlines', label: 'Hardlines', disabled: true }];

    // Ícono de chat bubble para Comunicaciones — más reconocible que el sobre
    const CommsIcon = ({ size = 18 }) =>
      <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
      </svg>;



    const Masthead = ({ active = 'inicio', unread = 3 }) =>
      <header className="gm-mast">
        <div className="gm-mast__logo">
          <img src="Img/Logo walmart chile.png" alt="Walmart Chile" style={{ height: '40px', display: 'block' }} />
        </div>
        <nav className="gm-mast__nav">
          {NAV_ITEMS.map((n) => {
            const subs = NAV_SUBCATS[n.id];
            const hasSubs = Array.isArray(subs) && subs.length > 0;
            return (
              <div key={n.id} className="gm-mast__nav-wrap">
                <button
                  className={`gm-mast__nav-item${n.id === active ? ' is-active' : ''}${n.disabled ? ' is-disabled' : ''}`}
                  disabled={n.disabled}>

                  {n.label}
                  {hasSubs ? <span className="gm-mast__nav-caret" aria-hidden="true">▾</span> : null}
                </button>
                {hasSubs ?
                  <div className="gm-mast__submenu" role="menu">
                    <div className="gm-mast__submenu-head">{n.label}</div>
                    {subs.map((s) =>
                      <a
                        key={s.id}
                        href="#"
                        className={`gm-mast__sub-item${s.disabled ? ' is-disabled' : ''}`}
                        role="menuitem">

                        <span>{s.label}</span>
                        {s.disabled ? <span className="gm-mast__sub-chip">próximamente</span> : <span className="gm-mast__sub-chev">›</span>}
                      </a>
                    )}
                  </div> :
                  null}
              </div>);

          })}
        </nav>
        <div className="gm-mast__actions">
          <button className={`gm-mast__btn gm-mast__btn--comms${active === 'comms' ? ' is-active' : ''}`}>
            <span className="gm-mast__btn-icon"><CommsIcon size={18} /></span>
            <span>Comunicaciones</span>
            {unread > 0 ? <span className="gm-mast__btn-badge">{unread}</span> : null}
          </button>
          <span className="gm-mast__avatar" title="Renatta Crovetto"><UserAvatar profile={PROFILES[0]} size={36} /></span>
        </div>
      </header>;


    // Bar bajo masthead — breadcrumb + acciones secundarias (categoría)
    const SubBar = ({ trail = [], rightSlot }) =>
      <div className="gm-bar">
        {trail.map((t, i) =>
          <React.Fragment key={i}>
            {i > 0 ? <span className="sep">/</span> : null}
            <a className={`crumb${i === trail.length - 1 ? ' is-current' : ''}`} href="#">{t}</a>
          </React.Fragment>
        )}
        <div className="gm-bar__spacer"></div>
        {rightSlot}
      </div>;


    // ─────────────────────────────────────────────────────────────
    // Avatar
    // ─────────────────────────────────────────────────────────────
    const Avatar = ({ initials, size = 'md', tone = 'blue' }) => {
      const cls = `gm-avatar${size === 'sm' ? ' gm-avatar--sm' : size === 'lg' ? ' gm-avatar--lg' : ''}`;
      const styles = tone === 'yellow' ? { background: 'var(--wm-spark-400)', color: '#002d58' } : null;
      return <span className={cls} style={styles}>{initials}</span>;
    };

    // ─────────────────────────────────────────────────────────────
    // Buttons / fields / search
    // ─────────────────────────────────────────────────────────────
    const Btn = ({ children, kind = 'primary', size, style, onClick }) =>
      <button
        type="button"
        className={`gm-btn gm-btn--${kind}${size ? ' gm-btn--' + size : ''}`}
        style={style}
        onClick={onClick}>
        {children}</button>;


    const Field = ({ label, placeholder, type = 'text', value, icon }) => {
      const [show, setShow] = React.useState(false);
      return (
        <label className="stack-sm">
          {label ? <span className="gm-field-label">{label}</span> : null}
          <div className="gm-field">
            {icon ? <span style={{ color: 'var(--wm-ns-300)' }}>{icon}</span> : null}
            <input
              type={type === 'password' && !show ? 'password' : 'text'}
              defaultValue={value}
              placeholder={placeholder} />

            {type === 'password' ?
              <button type="button" className="gm-field__toggle" onClick={() => setShow(!show)}>
                {show ? 'Ocultar' : 'Mostrar'}
              </button> :
              null}
          </div>
        </label>);

    };

    const Search = ({ placeholder = 'Buscar...', style }) =>
      <div className="gm-search" style={style}>
        <span style={{ color: 'var(--wm-ns-300)' }}>⌕</span>
        <input placeholder={placeholder} />
      </div>;


    // ─────────────────────────────────────────────────────────────
    // Status / severity
    // ─────────────────────────────────────────────────────────────
    const Sev = ({ level = 'normal', children }) =>
      <span className={`gm-sev gm-sev--${level}`}>
        <span className="gm-sev__dot"></span>
        {children}
      </span>;


    const Sem = ({ s }) => <span className={`gm-sem gm-sem--${s}`}>{s === 'r' ? '!' : ''}</span>;

    const Chip = ({ children, kind, dot }) =>
      <span className={`gm-chip${kind ? ' gm-chip--' + kind : ''}`}>
        {dot ? <span className="gm-chip__dot"></span> : null}
        {children}
      </span>;


    const Progress = ({ value = 60, tone = 'brand' }) =>
      <div className={`gm-progress${tone === 'success' ? ' gm-progress--success' : tone === 'warning' ? ' gm-progress--warning' : tone === 'disabled' ? ' gm-progress--disabled' : ''}`}>
        <div className="gm-progress__fill" style={{ width: `${value}%` }}></div>
      </div>;


    // Card title / link header
    const CardHead = ({ title, link, right }) =>
      <div className="gm-card__head">
        <h3 className="gm-card__title">{title}</h3>
        {right ? right : link ? <a className="gm-card__see" href="#">{link}</a> : null}
      </div>;


    // ─────────────────────────────────────────────────────────────
    // Kanban — Walmart-styled
    // ─────────────────────────────────────────────────────────────
    const KANBAN_COLUMNS = [
      { id: 'todo', title: 'Por hacer', count: 8 },
      { id: 'doing', title: 'En curso', count: 5 },
      { id: 'review', title: 'En revisión', count: 3 }];


    const SAMPLE_TASKS = {
      todo: [
        { t: 'Revisar muestras Primavera–Verano 26', desc: 'Aprobación de muestras finales REF-038 y REF-042', who: 'Ana Soto', due: window.GMUtils ? window.GMUtils.formatDayMonth(3) : '18 jun', col: 'Primavera–Verano 26' },
        { t: 'Aprobar telas — Vestidos', desc: 'Confirmar lote de tela con Trends Co. antes del corte', who: 'María Pérez', due: window.GMUtils ? window.GMUtils.formatDayMonth(5) : '20 jun', col: 'Primavera–Verano 26' },
        { t: 'Brief proveedor Trends Co.', desc: 'Preparar brief para nueva colección Otoño', who: 'Juan Rivas', due: window.GMUtils ? window.GMUtils.formatDayMonth(6) : '21 jun', col: 'Otoño 26' }],

      doing: [
        { t: 'Fotos catálogo Otoño', desc: 'Sesión de fotos con modelo — estudio central', who: 'Laura Vera', due: window.GMUtils ? window.GMUtils.formatDayMonth(1) : '16 jun', col: 'Otoño 26' },
        { t: 'Tech pack — Blusas', desc: 'Actualizar tabla de tallas y especificaciones de costura', who: 'Ana Soto', due: window.GMUtils ? window.GMUtils.formatDayMonth(2) : '17 jun', col: 'Primavera–Verano 26' }],

      review: [
        { t: 'QA muestra final Pantalón', desc: 'Revisión de fit 2 con equipo de calidad', who: 'Pablo Lara', due: window.GMUtils ? window.GMUtils.formatDayMonth(0) : '15 jun', col: 'Primavera–Verano 26' }],



    };

    const initials = (full) => full.split(' ').map((p) => p[0]).slice(0, 2).join('').toUpperCase();

    const COLECCION_SETS = {
      all: [{ id: 'all', label: 'Todas' }, { id: 'Primavera–Verano 26', label: 'Primavera–Verano 26' }, { id: 'Otoño 26', label: 'Otoño 26' }, { id: 'Invierno 26', label: 'Invierno 26' }],
      mujer: [{ id: 'all', label: 'Todas' }, { id: 'Primavera–Verano 26', label: 'Primavera–Verano 26' }, { id: 'Invierno 26', label: 'Invierno 26' }],
    };
    const Kanban = ({ density = 'spacious', scope = 'todas las categorías', colSet = 'all' }) => {
      const compact = density === 'compact';

      const [tasks, setTasks] = React.useState(() => ({
        todo: [...SAMPLE_TASKS.todo],
        doing: [...SAMPLE_TASKS.doing],
        review: [...SAMPLE_TASKS.review],
      }));
      const [dragging, setDragging] = React.useState(null); // { colId, task }
      const [dragOver, setDragOver] = React.useState(null);

      // ── Filter state ──
      const [showFilters, setShowFilters] = React.useState(false);
      const [activePrios, setActivePrios] = React.useState(new Set());
      const [activeWhos, setActiveWhos] = React.useState(new Set());

      const allPeople = [...new Set(Object.values(tasks).flat().map(t => t.who.split(' ')[0]))].sort();
      const activeFilterCount = activePrios.size + activeWhos.size;

      const toggleSet = (setter, key) => setter(prev => {
        const s = new Set(prev); s.has(key) ? s.delete(key) : s.add(key); return s;
      });
      const clearFilters = () => { setActivePrios(new Set()); setActiveWhos(new Set()); };

      const applyFilters = (colTasks) => colTasks.filter(tk => {
        if (activePrios.size && !activePrios.has(tk.prio || 'none')) return false;
        if (activeWhos.size && !activeWhos.has(tk.who.split(' ')[0])) return false;
        return true;
      });

      // ── Drag-and-drop (by task reference so filter indices don't break it) ──
      const onDragStart = (colId, task) => (e) => {
        setDragging({ colId, task });
        e.dataTransfer.effectAllowed = 'move';
      };
      const onDragOver = (colId) => (e) => {
        e.preventDefault();
        if (dragOver !== colId) setDragOver(colId);
      };
      const onDrop = (targetColId) => (e) => {
        e.preventDefault();
        if (!dragging || dragging.colId === targetColId) { setDragging(null); setDragOver(null); return; }
        const { colId: srcId, task } = dragging;
        setTasks(prev => ({
          ...prev,
          [srcId]: prev[srcId].filter(t => t !== task),
          [targetColId]: [task, ...prev[targetColId]],
        }));
        setDragging(null); setDragOver(null);
      };
      const onDragEnd = () => { setDragging(null); setDragOver(null); };

      const [activeCol, setActiveCol] = React.useState('all');
      const COLECCION_TABS = COLECCION_SETS[colSet] || COLECCION_SETS.all;

      const applyColFilter = (colTasks) =>
        activeCol === 'all' ? colTasks : colTasks.filter(t => t.col === activeCol);

      return (
        <div className="stack-md">
          {/* Header */}
          <div className="between">
            <h3 className="gm-card__title">Tareas pendientes</h3>
            <Btn kind="primary" size="sm" onClick={() => window.__app?.openModal?.('task')}>+ Nueva tarea</Btn>
          </div>
          {/* Collection tabs */}
          <div style={{ display: 'flex', gap: 4, borderBottom: '1px solid var(--wm-ns-100)', paddingBottom: 0 }}>
            {COLECCION_TABS.map(tab => (
              <button key={tab.id} onClick={() => setActiveCol(tab.id)}
                style={{
                  padding: '6px 14px', border: 'none', background: 'transparent', cursor: 'pointer',
                  fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: activeCol === tab.id ? 700 : 500,

                  borderBottom: activeCol === tab.id ? '2px solid var(--wm-sb-400)' : '2px solid transparent',
                  marginBottom: -1
                }}>
                {tab.label}

          {/* Inline filter panel */}
          {showFilters && (
            <div className="gm-kanban__filter-panel">
              <div className="gm-kanban__filter-group">

                  <button key={p}
                    className={`gm-kanban__filter-chip${activeWhos.has(p) ? ' is-active' : ''}`}

                ))}
              </div>
              {activeFilterCount > 0 && (
                <button className="gm-kanban__filter-clear" onClick={clearFilters}>Limpiar filtros</button>
              )}
            </div>
          )}

          {/* Board */}
          <div className="gm-kanban">
            {KANBAN_COLUMNS.map((col) => {
              const colTasks = applyColFilter(applyFilters(tasks[col.id] || []));
              const totalInCol = applyColFilter(tasks[col.id] || []).length;
              const isOver = dragOver === col.id && dragging?.colId !== col.id;
              return (
                <div key={col.id} className="gm-kanban__col"
                  style={isOver ? { background: 'var(--wm-sb-050)', outline: '2px dashed var(--wm-sb-300)', outlineOffset: -2, borderRadius: 8 } : {}}
                  onDragOver={onDragOver(col.id)}
                  onDragLeave={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(null); }}
                  onDrop={onDrop(col.id)}
                >
                  <div className="gm-kanban__head">
                    <span>{col.title}</span>
                    <span className="gm-kanban__count">
                      {activeFilterCount > 0 ? `${colTasks.length}/${totalInCol}` : colTasks.length}
                    </span>
                  </div>

                  {colTasks.map((tk, i) => {
                    const isDraggingThis = dragging?.task === tk;
                    return (
                      <div key={i}
                        className={`gm-task${compact ? ' gm-task--compact' : ''}`}
                        draggable
                        style={{ cursor: 'grab', opacity: isDraggingThis ? 0.35 : 1, transform: isDraggingThis ? 'scale(0.96)' : 'none', transition: 'opacity .15s, transform .15s' }}
                        onDragStart={onDragStart(col.id, tk)}
                        onDragEnd={onDragEnd}
                      >
                        <div className="gm-task__title">{tk.t}</div>
                        {!compact && tk.desc && <div style={{ fontSize: 12, color: 'var(--wm-ns-400)', fontFamily: 'var(--font-sans)', marginTop: 2, lineHeight: 1.4 }}>{tk.desc}</div>}

                  {activeFilterCount > 0 && colTasks.length === 0 && (

    };

    // ─────────────────────────────────────────────────────────────
    // Alert icons by semantic type
    // ─────────────────────────────────────────────────────────────
    const ALERT_ICON_PATHS = {
      proveedor: <g><rect x="1" y="3" width="15" height="13" rx="1" /><path d="M16 8h4l3 4v4h-7V8z" /><circle cx="5.5" cy="18.5" r="2.5" /><circle cx="18.5" cy="18.5" r="2.5" /></g>,
      muestra: <g><circle cx="11" cy="11" r="8" /><path d="M21 21l-4.35-4.35" /><path d="M11 8v3M11 14v.01" /></g>,
      produccion: <g><circle cx="12" cy="12" r="3" /><path d="M12 2v3M12 19v3M4.22 4.22l2.1 2.1M17.68 17.68l2.1 2.1M2 12h3M19 12h3M4.22 19.78l2.1-2.1M17.68 6.32l2.1-2.1" /></g>,
      calidad: <g><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="M9 12l2 2 4-4" /></g>,
      comercial: <g><line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" /></g>,
      calendario: <g><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></g>,
      tallas: <g><path d="M2 20h20M6 20V8l6-4 6 4v12" /><path d="M10 20v-4h4v4" /><path d="M10 12h4" /></g>,

    };

    const ALERT_LEVEL_COLOR = {

    const AlertIcon = ({ type = 'general', level = 'normal' }) => {

    // ─────────────────────────────────────────────────────────────

                      textDecoration: showCompleted ? 'line-through' : 'none',
                      cursor: 'pointer',
                      transition: 'color 0.15s'
                    }} onClick={() => toggleTask(t.id)}>
                      {t.title}
                    </div>
                    <div style={{
                      fontSize: '12px',
                      color: dueColor,
                      marginTop: 3,
                      fontFamily: 'var(--font-sans)',
                      fontWeight: t.isToday && !showCompleted ? '600' : 'normal'
                    }}>
                      {dueText}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };


    // ─────────────────────────────────────────────────────────────
    // Step bar — 6-segment pipeline for category cards
    // ─────────────────────────────────────────────────────────────
    const WORKFLOW_STEPS = ['Brief', 'Diseño', 'Negociación', 'Contramuestra', 'Producción', 'Calidad'];

    const StepBar = ({ currentStep = 0, currentPhase, total = 6 }) => (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 5, marginTop: 4 }}>
        <div style={{ display: 'flex', gap: 3 }}>
          {Array.from({ length: total }, (_, i) => (
            <div key={i} style={{
              height: 4, flex: 1, borderRadius: 2,
              background: i < currentStep ? 'var(--wm-sb-300)' : i === currentStep ? 'var(--wm-sb-400)' : 'var(--wm-ns-100)',
              transition: 'background .2s',
            }} />
          ))}
        </div>
        <div style={{ fontFamily: 'var(--font-sans)', fontSize: 11, color: 'var(--wm-ns-500)', fontWeight: 500 }}>
          Paso {currentStep + 1}/{total} · {currentPhase || WORKFLOW_STEPS[currentStep] || ''}
        </div>
      </div>
    );

    // ─────────────────────────────────────────────────────────────
    // Microsoft Teams icon
    // ─────────────────────────────────────────────────────────────
    const TeamsIcon = ({ size = 18 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="5" fill="#6264A7" />
        <path d="M7.5 8h9v2.5h-3.5v7h-2v-7H7.5z" fill="white" />

        // ─── Categorías de nivel superior ───

        // home — Casa
        casa: <path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-9z" />,

        electro: <g><rect x="3" y="6" width="18" height="12" rx="2" /><path d="M8 21h8M12 18v3" /></g>,

        hardlines: <g><path d="M14 4l6 6-2 2-2-2-6 6-3-3 6-6-2-2 3-3z" /><path d="M8 14l-5 5 2 2 5-5" /></g>,

        // ─── Subcategorías de Moda ───
        // mujer — vestido (V neck + flared skirt)
        mujer: <g><path d="M9 4l1 2 2-2 2 2 1-2 2 3-1 3 2 11H6l2-11-1-3z" /><path d="M11 6h2" /></g>,
        // hombre — camisa con cuello y botones
        hombre: <g><path d="M7 4l3-1 2 3 2-3 3 1 3 3-2 2-1 12H7L6 9 4 7z" /><path d="M12 6v12" /></g>,
        // infantil — polera (t-shirt cuello redondo, mangas cortas)
        infantil: <path d="M9 4q3 3 6 0l3 1 3 4-3 2v10H6V11L3 9l3-4z" />,
        // baby — onesie + cabecita
        baby: <g><circle cx="12" cy="5.5" r="2" /><path d="M9 10h6l2 4-2 2v4h-2v-3h-2v3H9v-4l-2-2z" /></g>,
        // calzado — zapatilla de perfil
        calzado: <g><path d="M3 14l2-3 5-1 3 2 7 1 1 2v3H3z" /><path d="M9 13l2 2M14 14l1 1.5" /></g>,
        // interior — calzón / briefs
        interior: <path d="M5 8h14l-1 6-4 5-1-6h-2l-1 6-4-5z" />
      };
      return <svg {...common}>{paths[id] || paths.moda}</svg>;
    };

    // ─────────────────────────────────────────────────────────────
    // Category card — compact hero + status chip + progress + meta line
    // ─────────────────────────────────────────────────────────────
    const CategoryCard = ({ id, name, icon, progress, currentStep, currentPhase, disabled, sub, status, alerts, nextMilestone, launch }) => {
      const heroSlug = id || (icon ? icon.toLowerCase() : 'moda');

      if (disabled) {
        return (
          <div className="gm-cat gm-cat--disabled">

      return (
        <div className="gm-cat">
          <div className="gm-cat__hero">
            <div className="gm-cat__hero-spark"><SparkMark /></div>

                {status.label}

              <div className="gm-cat__meta-row">

                    <span className="gm-cat__meta-dot"></span>{alerts.warn} alertas

                  <span className="gm-cat__meta-pill">{alerts.tasks} tareas</span> : null}

          </div>
          <span className="gm-cat__chev" aria-hidden="true">›</span>
        </div>);
    };


    Object.assign(window, {
      SparkMark, WalmartWord, WalmartWordmark,
      Masthead, SubBar, CommsIcon,
      Avatar, Btn, Field, Search, Sev, Sem, Chip, Progress,
      CardHead, Kanban, AlertList, AlertIcon, CategoryCard, CategoryIcon,
      StepBar, TeamsIcon, WORKFLOW_STEPS,
      KANBAN_COLUMNS, SAMPLE_TASKS, initials, NAV_SUBCATS, TodoList
    });
  </script>
  <script type="text/babel">
    // screens.jsx
    /* global React, SparkMark, WalmartWord, Masthead, SubBar, Avatar, Btn, Field, Search, Sev, Sem, Chip, Progress, CardHead, Kanban, AlertList, CategoryCard, initials, TodoList */

    // ─────────────────────────────────────────────────────────────

            <img src="Img/Logo walmart chile.png" alt="Walmart Chile" style={{ height: '60px', display: 'block', marginBottom: '16px' }} />

      { name: 'Blusas', ref: 'REF-019', fase: 'Producción', estado: 'bloqueada' },

      enCurso: '#2563eb',
      bloqueada: '#dc2626',
      retrasada: '#d97706',
      completada: '#16a34a',
    };

    const SmartComposer = ({ placeholder, kind = 'int' }) => {
      const [text, setText] = React.useState('');
      const [picker, setPicker] = React.useState(false);
      const [query, setQuery] = React.useState('');
      const [pending, setPending] = React.useState(null); // prenda attached
      const [sent, setSent] = React.useState([]);   // sent bubbles

      const filtered = MENTION_PRENDAS.filter(p =>
        !query ||
        p.name.toLowerCase().startsWith(query.toLowerCase()) ||
        p.ref.toLowerCase().includes(query.toLowerCase())
      );

      const handleChange = (e) => {
        const val = e.target.value;
        setText(val);
        const atMatch = val.match(/@([^\s@]*)$/);
        const refMatch = val.match(/\bREF-?\w*$/i);
        if (atMatch) { setPicker(true); setQuery(atMatch[1]); }
        else if (refMatch) { setPicker(true); setQuery(''); }
        else { setPicker(false); setQuery(''); }
      };

      const selectPrend = (p) => {
        const cleaned = text.replace(/@[^\s@]*$/, '').replace(/\bREF-?\w*$/i, '').trimEnd();
        setText(cleaned + (cleaned ? ' ' : '') + `@${p.name} `);
        setPending(p);
        setPicker(false);
        setQuery('');
      };

      const openPicker = () => {
        setText(t => t + '@');
        setPicker(true);
        setQuery('');
      };

      const handleSend = () => {
        if (!text.trim() && !pending) return;
        setSent(prev => [...prev, { text: text.trim(), prenda: pending }]);
        setText('');
        setPending(null);
        setPicker(false);
      };

      return (
        <div>
          {/* Rendered sent bubbles */}
          {sent.map((b, i) => (
            <div key={i} className="gm-bubble-row" style={{ justifyContent: 'flex-end' }}>
              <div className={`gm-bubble gm-bubble--tx`}>
                {b.prenda && (
                  <PrendaRefCard
                    name={b.prenda.name}
                    refCode={b.prenda.ref}
                    step={`${b.prenda.fase} · Primavera–Verano 26`}
                    severity={b.prenda.estado === 'bloqueada' ? 'crit' : b.prenda.estado === 'retrasada' ? 'warn' : 'normal'}
                  />
                )}
                {b.text && <div className="gm-bubble__text">{b.text}</div>}
                <span className="gm-bubble__time">ahora</span>
              </div>
            </div>
          ))}

          {/* Pending prenda badge */}
          {pending && (
            <div style={{
              display: 'flex', alignItems: 'center', gap: 8, padding: '7px 20px',
              background: 'var(--wm-sb-050)', borderTop: '1px solid var(--wm-sb-100)',
              fontFamily: 'var(--font-sans)', fontSize: 12
            }}>
              <span style={{
                fontWeight: 700, color: 'var(--wm-sb-500)', background: 'var(--wm-sb-100)',
                padding: '2px 7px', borderRadius: 4
              }}>{pending.ref}</span>
              <span style={{ color: 'var(--wm-ns-600)' }}>{pending.name} · {pending.fase}</span>
              <span style={{ marginLeft: 'auto', fontSize: 10, color: ESTADO_COLOR_MAP[pending.estado] }}>●&nbsp;
                {pending.estado === 'bloqueada' ? 'Bloqueada' : pending.estado === 'retrasada' ? 'Retrasada' : 'En curso'}
              </span>
              <button style={{ border: 'none', background: 'none', cursor: 'pointer', color: 'var(--wm-ns-400)', fontSize: 18, lineHeight: 1, padding: '0 4px' }}
                onClick={() => setPending(null)}>×</button>
            </div>
          )}

          {/* Composer + picker */}
          <div style={{ position: 'relative' }}>
            {picker && filtered.length > 0 && (
              <div className="gm-mention-picker">
                <div className="gm-mention-picker__head">
                  Mencionar prenda{query ? ` · "${query}"` : ' — escribe para filtrar'}
                </div>
                {filtered.map(p => (
                  <button key={p.ref} className="gm-mention-picker__item" onClick={() => selectPrend(p)}>
                    <span className="gm-mention-picker__ref">{p.ref}</span>
                    <span className="gm-mention-picker__name">{p.name}</span>
                    <span className="gm-mention-picker__fase">{p.fase}</span>
                    <span style={{ fontSize: 10, color: ESTADO_COLOR_MAP[p.estado] }}>●</span>
                  </button>
                ))}
              </div>
            )}
            <div className="gm-thread__composer">
              <Btn kind="secondary" size="sm"><svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ marginRight: 4 }}><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48" /></svg>Adjuntar</Btn>

                  onChange={handleChange}
                  onKeyDown={e => { if (e.key === 'Escape') setPicker(false); if (e.key === 'Enter' && !picker) handleSend(); }}

        const foundProfile = PROFILES.find(p => p.email === selectedEmail);
        if (foundProfile) {
          setUser(foundProfile);
          if (foundProfile.access === 'moda' || foundProfile.access === 'compras') {
            navigate('moda-mujer');
          } else if (foundProfile.access === 'practicante') {
            navigate('fichas');
          } else {
            navigate('panel');

        }
      };

      const handleSelectProfile = (profile) => {
        setSelectedEmail(profile.email);
        setShowDropdown(false);
        setFocusedIndex(-1);
      };

      const handleKeyDown = (e) => {
        if (!showDropdown) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); setFocusedIndex(i => Math.min(i + 1, PROFILES.length - 1)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setFocusedIndex(i => Math.max(i - 1, 0)); }
        else if (e.key === 'Enter' && focusedIndex >= 0) { e.preventDefault(); handleSelectProfile(PROFILES[focusedIndex]); }
        else if (e.key === 'Escape') { setShowDropdown(false); }
      };

            </button>
            <span style={{ opacity: .7 }}>|</span>
            <span>Verano 2026 — Flujo completo de producción</span>
            <span style={{
              marginLeft: 'auto', fontSize: 11, padding: '3px 10px', borderRadius: 20,
              background: 'rgba(255,255,255,.2)', fontWeight: 700
            }}>Walmart Chile · Diseño GM</span>
          </div>
          {/* iframe con toda la App 4 */}
          <iframe
            src={src}
            title="Verano 2026 — Flujo de producción"
            style={{ flex: 1, border: 'none', width: '100%' }}
            allowFullScreen
          />
        </div>
      );
    };

    // ── Historial main list view ──────────────────────────────────────────────────
    const HistorialScreen = () => {
      const [selected, setSelected] = React.useState(null);
      const col = HISTORIAL_COLS.find(c => c.id === selected);
      return (
        <AppLayout>
          <SubBar trail={selected ? ['Inicio', 'Historial de colecciones', col?.name] : ['Inicio', 'Historial de colecciones']} />
          <div className="gm-page">
            {selected && col ? (
              <HistorialDetail col={col} onBack={() => setSelected(null)} />
            ) : (
              <>
                <div className="gm-page__head">
                  <div>
                    <h1 className="gm-page__title">Historial de colecciones</h1>
                    <div className="gm-page__sub">Registro de todas las temporadas — {HISTORIAL_COLS.length} colecciones</div>
                  </div>
                  <div className="row" style={{ gap: 8 }}>
                    <Btn kind="secondary" size="sm" onClick={() => window.__app?.showToast?.('Exportando historial...')}>Exportar</Btn>
                    <Btn kind="primary" size="sm" onClick={() => window.__app?.openModal?.('coleccion')}>+ Nueva coleccion</Btn>
                  </div>
                </div>
                {/* Summary KPIs */}
                <div className="grid" style={{ gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 28 }}>
                  {[
                    { label: 'Colecciones totales', value: String(HISTORIAL_COLS.length) },
                    { label: 'Colecciones cerradas', value: String(HISTORIAL_COLS.filter(c => c.status === 'cerrada').length) },
                    { label: 'Prendas en historico', value: String(HISTORIAL_COLS.reduce((s, c) => s + (c.prendas || 0), 0)) },
                    { label: 'Sell-through prom.', value: Math.round(HISTORIAL_COLS.filter(c => c.sellThrough).reduce((s, c) => s + c.sellThrough, 0) / HISTORIAL_COLS.filter(c => c.sellThrough).length) + '%' },
                  ].map((kpi, i) => (
                    <div key={i} className="gm-card" style={{ padding: '16px 20px' }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--wm-ns-400)', textTransform: 'uppercase', letterSpacing: '.05em', fontFamily: 'var(--font-sans)', marginBottom: 8 }}>{kpi.label}</div>
                      <div style={{ fontSize: 26, fontWeight: 700, color: 'var(--wm-ns-600)', fontFamily: 'var(--font-sans)' }}>{kpi.value}</div>
                    </div>
                  ))}
                </div>
                {/* Collection cards grid */}
                <div className="grid" style={{ gridTemplateColumns: 'repeat(2, 1fr)', gap: 16 }}>
                  {HISTORIAL_COLS.map(c => {
                    const sc = statusColor(c.status);
                    return (
                      <div key={c.id} className="gm-card" onClick={() => {
                        if (c.id === 'verano25') {
                          localStorage.setItem("gm_route", JSON.stringify({ screen: "inicio" }));
                          window.__app?.navigate?.('app4');
                        } else {
                          setSelected(c.id);
                        }
                      }}
                        style={{ cursor: 'pointer', transition: 'box-shadow .15s, transform .1s', border: '1px solid var(--wm-ns-100)' }}
                        onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,83,226,.10)'; e.currentTarget.style.transform = 'translateY(-1px)'; }}
                        onMouseLeave={e => { e.currentTarget.style.boxShadow = ''; e.currentTarget.style.transform = ''; }}>
                        {/* Card header stripe */}
                        <div style={{ height: 4, background: c.status === 'cerrada' ? '#059669' : c.status === 'en curso' ? 'var(--wm-sb-400)' : 'var(--wm-ns-200)', borderRadius: '8px 8px 0 0', margin: '-16px -16px 14px', width: 'calc(100% + 32px)' }} />
                        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 12 }}>
                          <div>
                            <div style={{ fontFamily: 'var(--font-sans)', fontSize: 18, fontWeight: 700, color: 'var(--wm-ns-700)' }}>{c.name}</div>
                            <div style={{ fontFamily: 'var(--font-sans)', fontSize: 12, color: 'var(--wm-ns-400)', marginTop: 3 }}>{c.dateRange}</div>
                            {c.id === 'verano25' && (
                              <div style={{ display: 'inline-flex', alignItems: 'center', gap: 5, marginTop: 6, fontSize: 11, fontWeight: 700, color: '#0053e2', background: '#eff6ff', border: '1px solid #bcdcfb', borderRadius: 6, padding: '3px 8px', fontFamily: 'var(--font-sans)' }}>
                                ↗ Ver flujo completo de producción
                              </div>
                            )}
                          </div>
                          <span style={{ fontSize: 11, padding: '3px 10px', borderRadius: 10, background: sc.bg, color: sc.color, fontWeight: 700, fontFamily: 'var(--font-sans)', whiteSpace: 'nowrap' }}>{c.status}</span>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 14 }}>
                          {[
                            { label: 'Prendas', value: c.prendas || '—' },
                            { label: 'Sell-through', value: c.sellThrough ? c.sellThrough + '%' : '—' },
                            { label: 'Margen', value: c.margen ? c.margen + '%' : '—' },
                          ].map((m, j) => (
                            <div key={j} style={{ background: 'var(--wm-ns-050)', borderRadius: 8, padding: '8px 10px' }}>
                              <div style={{ fontFamily: 'var(--font-sans)', fontSize: 10, color: 'var(--wm-ns-400)', textTransform: 'uppercase', letterSpacing: '.04em', marginBottom: 4 }}>{m.label}</div>
                              <div style={{ fontFamily: 'var(--font-sans)', fontSize: 16, fontWeight: 700, color: 'var(--wm-ns-700)' }}>{m.value}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                          <div style={{ display: 'flex', gap: 6 }}>
                            {(HISTORIAL_DOCS[c.id] || []).length > 0 && (
                              <span style={{ fontSize: 11, color: 'var(--wm-ns-400)', fontFamily: 'var(--font-sans)' }}>
                                {(HISTORIAL_DOCS[c.id] || []).length} documentos
                              </span>
                            )}
                          </div>
                          <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--wm-sb-400)', fontFamily: 'var(--font-sans)' }}>Ver detalle ›</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        </AppLayout>
      );
    };

    // ── Root app ──────────────────────────────────────────────────────────────────
    const ProtoApp = () => {
      const [screen, setScreen] = React.useState('splash');
      const [toast, setToast] = React.useState(null);
      const [modal, setModal] = React.useState(null);
      const [filterCtx, setFilterCtx] = React.useState(null);
      const [selectedStep, setSelectedStep] = React.useState(null);
      const [toolCtx, setToolCtx] = React.useState(null);
      const [user, setUser] = React.useState(null);

      const navigate = (s) => {
        if (user && user.access === 'practicante' && (s === 'panel' || s === 'inicio' || s === 'app4' || s === 'moda-mujer' || s === 'moda')) {
          setScreen('fichas');
          return;
        }
        if (user && (user.access === 'moda' || user.access === 'compras') && s === 'panel') {
          setScreen('moda-mujer');
          return;
        }
        if (s !== 'login' && s !== 'splash' && user && !isScreenAllowed(user, s)) {
          showToast('Acceso restringido para tu perfil');
          return;
        }
        if (s !== screen) {
          window.top.__gmHistoryStack = window.top.__gmHistoryStack || [];
          if (screen && screen !== 'splash' && screen !== 'login') {
            const last = window.top.__gmHistoryStack[window.top.__gmHistoryStack.length - 1];

            let iframeScreen = null;
            if (screen === 'app4') {
              try {
                const r = JSON.parse(localStorage.getItem("gm_route"));
                if (r && r.screen) iframeScreen = r.screen;
              } catch (e) { }
            }

            const stateToPush = iframeScreen
              ? { app: 'app4', screen: iframeScreen }
              : { app: 'parent', screen: screen };

            if (!window.top.__gmIsGoingBack) {
              if (!last || last.app !== stateToPush.app || last.screen !== stateToPush.screen) {
                window.top.__gmHistoryStack.push(stateToPush);
              }
            }
          }
        }
        setScreen(s);
      };
      const showToast = (msg) => setToast(msg);
      const openModal = (t) => setModal(t);
      const openFilters = (ctx) => setFilterCtx(ctx);

      // Expose to screens.jsx components via window
      window.__app = { showToast, openModal, openFilters, setStep: setSelectedStep, navigate, setToolCtx, setUser, screen };
      // Exponer navigate directamente para componentes sin acceso al contexto
      window.__app.navigate = navigate;

      // Keep screen updated on window.__app
      React.useEffect(() => {
        if (window.__app) window.__app.screen = screen;
      }, [screen]);

      // Back navigation function
      React.useEffect(() => {
        window.top.__gmHistoryStack = window.top.__gmHistoryStack || [];

        window.top.__gmGoBack = () => {
          window.top.__gmHistoryStack = window.top.__gmHistoryStack || [];
          const prev = window.top.__gmHistoryStack.pop();
          if (!prev) return;

          window.top.__gmIsGoingBack = true;

          if (prev.app === 'parent') {
            window.__app.navigate(prev.screen);
          } else if (prev.app === 'app4') {
            localStorage.setItem("gm_route", JSON.stringify({ screen: prev.screen }));
            if (window.__app.screen !== 'app4') {
              window.__app.navigate('app4');
            } else {
              const event = new CustomEvent('gm_navigate_iframe', { detail: { screen: prev.screen } });
              window.dispatchEvent(event);
            }
          }

          setTimeout(() => {
            window.top.__gmIsGoingBack = false;
          }, 150);
        };
      }, [screen]);

      // Auto-advance splash
      React.useEffect(() => {
        if (screen !== 'splash') return;
        const t = setTimeout(() => setScreen('login'), 2500);
        return () => clearTimeout(t);
      }, [screen]);

      return (
        <RouterCtx.Provider value={{ navigate, screen, selectedStep, toolCtx, setToolCtx, showToast, openModal, openFilters, user, setUser }}>
          <div style={{ height: '100%' }}>
            {screen === 'splash' && <div onClick={() => navigate('login')} style={{ cursor: 'pointer', height: '100%' }}><SplashScreen /></div>}
            {screen === 'login' && <LoginScreenNav />}
            {screen === 'panel' && <PanelControl layout="C" density="spacious" />}
            {screen === 'comms' && <CommsScreen />}
            {screen === 'moda' && <ModaGeneral density="spacious" />}
            {screen === 'moda-mujer' && <ModaMujer selectedStep={selectedStep} />}
            {screen === 'calendario' && <CalendarioScreen toolCtx={toolCtx} />}
            {screen === 'colecciones' && <ColeccionesPasadas toolCtx={toolCtx} />}
            {screen === 'documentos' && <DocumentosScreen toolCtx={toolCtx} />}
            {screen === 'kpis' && <KPIsScreen toolCtx={toolCtx} />}
            {screen === 'historial' && <HistorialScreen />}
            {/* ── Nuevas pantallas del flujo de producción ── */}
            {screen === 'inicio' && <FlowDashboard />}
            {screen === 'tendencias' && <TendenciasScreen />}
            {screen === 'viaje' && <ViajeScreen />}
            {screen === 'coleccion' && <ColeccionScreen />}
            {screen === 'muestras' && <MuestrasScreen />}
            {screen === 'fichas' && <FichasScreen />}
            {screen === 'contramuestras' && <ContramuestrasScreen />}
            {screen === 'manuales' && window.GMScreens.Manuales && React.createElement(window.GMScreens.Manuales, { go: navigate })}
            {screen === 'negociacion' && <NegociacionScreen />}
            {screen === 'fichas_revisadas' && window.GMScreens.FichasRevisadas && React.createElement(window.GMScreens.FichasRevisadas, { go: navigate })}
            {screen === 'validacion' && <ValidacionScreen />}
            {screen === 'cierre' && <CierreScreen />}
            {screen === 'app4' && window.GMApp && React.createElement(window.GMApp)}

            {/* Global overlays — rendered outside screen so they float above everything */}
            {filterCtx && <FilterSidebar ctx={filterCtx} onClose={() => setFilterCtx(null)} />}
            {modal && <AppModal type={modal} onClose={() => setModal(null)} />}
            {toast && <Toast message={toast} onDone={() => setToast(null)} />}
          </div>
        </RouterCtx.Provider>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<ProtoApp />);

  </script>
</body>

</html>
